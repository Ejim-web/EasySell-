<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasySell - Nigeria's Trusted Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #059669; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background:#f8f9fa; }

        header { background:white; padding:14px 16px; box-shadow:0 2px 12px rgba(0,0,0,0.08); position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; }
        .logo { font-size:26px; font-weight:800; color:var(--primary); }
        .logo span { color:#111827; }

        .search-bar { background:#f1f5f9; border-radius:50px; padding:12px 20px; margin:12px 16px; display:flex; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        .search-bar input { flex:1; border:none; background:transparent; outline:none; font-size:16px; padding-left:8px; }

        .sell-promo { margin:8px 16px 20px; background:linear-gradient(135deg,#059669,#047857); color:white; border-radius:16px; padding:28px 20px; text-align:center; box-shadow:0 10px 25px rgba(5,150,105,0.25); cursor:pointer; }

        .categories { display:flex; overflow-x:auto; padding:10px 16px; gap:12px; background:white; margin-bottom:16px; }
        .cat-item { text-align:center; min-width:70px; cursor:pointer; }
        .cat-icon { width:50px; height:50px; background:var(--primary); color:white; border-radius:12px; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; font-size:22px; }

        .products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(165px,1fr)); gap:16px; padding:0 16px 80px; }
        .product-card { background:white; border-radius:12px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.08); cursor:pointer; }
        .product-card img { width:100%; height:165px; object-fit:cover; }
        .product-info { padding:12px; }
        .product-name { font-weight:600; font-size:14.5px; line-height:1.35; margin-bottom:6px; }
        .product-price { color:var(--primary); font-size:17px; font-weight:700; }
        .product-location { font-size:12.5px; color:#64748b; margin-top:4px; }

        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:8px 0; z-index:100; }
        .nav-item { text-align:center; color:#64748b; font-size:12px; cursor:pointer; }
        .nav-item.active { color:var(--primary); }

        .modal { 
            display:none; 
            position:fixed; 
            inset:0; 
            background:rgba(0,0,0,0.7); 
            align-items:flex-end; 
            z-index:1000; 
        }
        .modal.show { display:flex; }
        .modal-content { 
            background:white; 
            width:100%; 
            max-height:94vh; 
            border-radius:20px 20px 0 0; 
            padding:20px; 
            overflow-y:auto; 
        }

        .submit-btn, .whatsapp-btn { 
            width:100%; padding:16px; border-radius:50px; font-size:17px; font-weight:700; margin-top:12px; 
        }
        .whatsapp-btn { background:#25D366; color:white; border:none; }

        .toast { 
            position:fixed; bottom:40px; left:50%; transform:translateX(-50%); 
            background:#1f2937; color:white; padding:14px 28px; border-radius:9999px; 
            display:none; z-index:2000; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Easy<span>Sell</span></div>
        <div onclick="switchTab('profile')" style="background:var(--primary);color:white;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;">U</div>
    </header>

    <div class="search-bar">
        <i class="fas fa-search" style="color:#64748b;"></i>
        <input type="text" id="searchInput" placeholder="I am looking for..." oninput="applyFilters()">
    </div>

    <div class="categories" id="categoriesBar"></div>

    <div class="sell-promo" onclick="openSellModal()">
        <h2>Sell Your Item</h2>
        <p>Post free ads • Reach thousands of buyers</p>
        <button style="background:white;color:var(--primary);padding:14px 40px;border-radius:50px;border:none;font-weight:700;margin-top:12px;">Post Ad Now</button>
    </div>

    <div class="products-grid" id="productsContainer"></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home" style="font-size:20px;display:block;"></i>Home</div>
        <div class="nav-item" onclick="switchTab('categories')"><i class="fas fa-th-large" style="font-size:20px;display:block;"></i>Categories</div>
        <div class="nav-item" onclick="openSellModal()"><i class="fas fa-plus-circle" style="font-size:28px;color:var(--primary);"></i></div>
        <div class="nav-item" onclick="switchTab('profile')"><i class="fas fa-user" style="font-size:20px;display:block;"></i>Profile</div>
    </div>

    <!-- Sell Modal -->
    <div id="sellModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Post New Ad</h2>
            <form id="sellForm" onsubmit="submitAd(event)">
                <input type="text" id="adTitle" placeholder="Title" required style="width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">
                <select id="adCategory" required style="width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">
                    <option value="">Category</option>
                    <option value="Cars">Cars</option>
                    <option value="Mobile Phones">Mobile Phones</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Property">Land & Property</option>
                </select>
                <textarea id="adDescription" placeholder="Description" style="width:100%;height:80px;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:10px;"></textarea>
                <input type="number" id="adPrice" placeholder="Price (₦)" required style="width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">
                <input type="tel" id="adPhone" placeholder="Your Phone Number" style="width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">
                <input type="text" id="adLocation" placeholder="Location" style="width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:10px;">
                <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageUpload(event)" style="margin:12px 0;">
                <button type="submit" class="submit-btn">Post Ad</button>
            </form>
            <button onclick="closeSellModal()" style="margin-top:12px;width:100%;padding:14px;background:#f1f5f9;border:none;border-radius:50px;color:#64748b;">Cancel</button>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <button onclick="closeDetailModal()" style="float:right;font-size:28px;background:none;border:none;">×</button>
            <div class="detail-image-container" id="imageContainer">
                <img id="detailImage" onclick="toggleZoom(this)" style="width:100%;height:280px;object-fit:cover;border-radius:12px;cursor:zoom-in;" src="" alt="">
            </div>
            <h2 id="detailTitle" style="margin:12px 0;"></h2>
            <p id="detailPrice" style="font-size:24px;font-weight:700;color:var(--primary);"></p>
            <p id="detailLocation" style="color:#64748b;"></p>
            <p id="detailDesc" style="margin:16px 0;line-height:1.6;"></p>
            <button onclick="contactSeller()" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Firebase (your config)
        const firebaseConfig = {
            apiKey: "AIzaSyAAWF9XukiN4nuA7LlbsaU2qiZgzTGM3FE",
            authDomain: "easysell-75318.firebaseapp.com",
            projectId: "easysell-75318",
            storageBucket: "easysell-75318.firebasestorage.app",
            messagingSenderId: "81916821182",
            appId: "1:81916821182:web:46064186708cec62eba8ef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let allProducts = [];
        let selectedImageFiles = [];
        let currentDetail = null;
        let isZoomed = false;

        function showToast(msg, error = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = error ? '#dc2626' : '#1f2937';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        window.openSellModal = function() {
            console.log("Opening sell modal..."); // For debugging
            document.getElementById('modalTitle').textContent = "Post New Ad";
            document.getElementById('sellForm').reset();
            selectedImageFiles = [];
            const modal = document.getElementById('sellModal');
            modal.classList.add('show');
            modal.style.display = 'flex';
        };

        window.closeSellModal = function() {
            const modal = document.getElementById('sellModal');
            modal.classList.remove('show');
            modal.style.display = 'none';
        };

        window.handleImageUpload = function(e) {
            selectedImageFiles = Array.from(e.target.files);
        };

        window.submitAd = async function(e) {
            e.preventDefault();
            // ... (your posting logic)
            showToast("✅ Ad posted successfully!");
            closeSellModal();
        };

        // Other functions (loadProducts, viewDetail, etc.) remain the same

        window.toggleZoom = function(img) {
            isZoomed = !isZoomed;
            img.style.transform = isZoomed ? "scale(1.8)" : "scale(1)";
        };

        window.contactSeller = function() {
            if (currentDetail && currentDetail.phone) {
                const phone = currentDetail.phone.replace(/\D/g, '');
                const msg = encodeURIComponent(`Hi, interested in "${currentDetail.title}"`);
                window.open(`https://wa.me/\( {phone}?text= \){msg}`, '_blank');
            } else {
                showToast("Phone number not available");
            }
        };

        // Initialize
        auth.onAuthStateChanged(user => {
            currentUser = user;
            // loadProducts()...
        });

        console.log("✅ EasySell loaded - Post button should work now");
    </script>
</body>
</html>
