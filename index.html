<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EasySell - Minimal</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/eruda">
    </script>
    <script>
        eruda.init();
    </script>
    <style>
        /* simple styles for this test */
        body {
            font-family: sans-serif;
            background: #0d0d0d;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #app {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        input {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #00b16a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #00995a;
        }
        .hidden {
            display: none;
        }
        .auth-divider {
            margin: 16px 0;
            color: #666;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #242424;
            border-left: 4px solid #00b16a;
            padding: 12px 20px;
            border-radius: 8px;
            color: #f0f0f0;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            z-index: 999;
            display: none;
        }
        .toast.error {
            border-left-color: #e74c3c;
        }
        .spinner {
            border: 3px solid #2a2a2a;
            border-top: 3px solid #00b16a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loader {
            display: none;
        }
        .loader.show {
            display: block;
        }
        #userInfo {
            background: #242424;
            padding: 20px;
            border-radius: 8px;
            margin-top: 16px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 16px;
        }
        .tabs button {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #aaa;
            margin: 0;
            border-radius: 6px;
        }
        .tabs button.active {
            background: #00b16a;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Auth container (login/signup) -->
        <div id="authContainer">
            <h1>EasySell</h1>
            <p style="color:#666;margin-bottom:16px;">Minimal Auth Test</p>
            <div class="tabs">
                <button id="tabLogin" class="active">Login</button>
                <button id="tabSignup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" />
                <input type="password" id="loginPassword" placeholder="Password" />
                <button id="loginBtn">Login</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="hidden">
                <input type="text" id="signupName" placeholder="Full Name" />
                <input type="email" id="signupEmail" placeholder="Email" />
                <input type="password" id="signupPassword" placeholder="Password (min 6)" />
                <button id="signupBtn">Create Account</button>
            </div>

            <div class="auth-divider">or</div>
            <button id="googleBtn" style="background:#4285F4;">Continue with Google</button>

            <div id="loader" class="loader"><div class="spinner"></div></div>
        </div>

        <!-- Logged-in view -->
        <div id="userContainer" class="hidden">
            <div id="userInfo">
                <h2>Welcome, <span id="userName">User</span></h2>
                <p id="userEmail"></p>
                <button id="logoutBtn" style="background:#e74c3c;margin-top:12px;">Logout</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast" class="toast"></div>

    <script>
        // ================================================================
        //  FIREBASE CONFIG
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAAWF9XukiN4nuA7LlbsaU2qiZgzTGM3FE",
            authDomain: "easysell-75318.firebaseapp.com",
            projectId: "easysell-75318",
            storageBucket: "easysell-75318.firebasestorage.app",
            messagingSenderId: "81916821182",
            appId: "1:81916821182:web:46064186708cec62eba8ef"
        };

        console.log('🔥 Initializing Firebase...');
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        console.log('✅ Firebase initialized');

        // ================================================================
        //  DOM REFS
        // ================================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const dom = {
            authContainer: $('#authContainer'),
            userContainer: $('#userContainer'),
            userName: $('#userName'),
            userEmail: $('#userEmail'),
            loginForm: $('#loginForm'),
            signupForm: $('#signupForm'),
            loginEmail: $('#loginEmail'),
            loginPassword: $('#loginPassword'),
            signupName: $('#signupName'),
            signupEmail: $('#signupEmail'),
            signupPassword: $('#signupPassword'),
            loginBtn: $('#loginBtn'),
            signupBtn: $('#signupBtn'),
            googleBtn: $('#googleBtn'),
            logoutBtn: $('#logoutBtn'),
            tabLogin: $('#tabLogin'),
            tabSignup: $('#tabSignup'),
            loader: $('#loader'),
            toast: $('#toast')
        };

        // ================================================================
        //  TOAST
        // ================================================================
        function showToast(msg, type = 'success') {
            const toast = dom.toast;
            toast.textContent = msg;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // ================================================================
        //  LOADER
        // ================================================================
        function showLoader(show) {
            dom.loader.classList.toggle('show', show);
        }

        // ================================================================
        //  AUTH
        // ================================================================
        // Login
        dom.loginBtn.addEventListener('click', function() {
            const email = dom.loginEmail.value.trim();
            const password = dom.loginPassword.value;
            if (!email || !password) { showToast('Enter email and password', 'error'); return; }
            showLoader(true);
            auth.signInWithEmailAndPassword(email, password)
                .then(() => showToast('Welcome back!'))
                .catch(err => { console.error(err);
                    showToast(err.message, 'error'); })
                .finally(() => showLoader(false));
        });

        // Signup
        dom.signupBtn.addEventListener('click', function() {
            const name = dom.signupName.value.trim();
            const email = dom.signupEmail.value.trim();
            const password = dom.signupPassword.value;
            if (!name || !email || !password) { showToast('Fill all fields', 'error'); return; }
            if (password.length < 6) { showToast('Password min 6 chars', 'error'); return; }
            showLoader(true);
            auth.createUserWithEmailAndPassword(email, password)
                .then((cred) => cred.user.updateProfile({ displayName: name }))
                .then(() => showToast('Account created!'))
                .catch(err => { console.error(err);
                    showToast(err.message, 'error'); })
                .finally(() => showLoader(false));
        });

        // Google
        dom.googleBtn.addEventListener('click', function() {
            showLoader(true);
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
                .then(() => showToast('Signed in with Google'))
                .catch(err => { console.error(err);
                    showToast(err.message, 'error'); })
                .finally(() => showLoader(false));
        });

        // Logout
        dom.logoutBtn.addEventListener('click', function() {
            auth.signOut();
        });

        // Tab switching
        dom.tabLogin.addEventListener('click', function() {
            dom.tabLogin.classList.add('active');
            dom.tabSignup.classList.remove('active');
            dom.loginForm.classList.remove('hidden');
            dom.signupForm.classList.add('hidden');
        });
        dom.tabSignup.addEventListener('click', function() {
            dom.tabSignup.classList.add('active');
            dom.tabLogin.classList.remove('active');
            dom.signupForm.classList.remove('hidden');
            dom.loginForm.classList.add('hidden');
        });

        // ================================================================
        //  AUTH STATE
        // ================================================================
        auth.onAuthStateChanged(user => {
            console.log('👤 Auth state:', user ? user.uid : 'null');
            if (user) {
                dom.authContainer.classList.add('hidden');
                dom.userContainer.classList.remove('hidden');
                dom.userName.textContent = user.displayName || 'User';
                dom.userEmail.textContent = user.email;
            } else {
                dom.authContainer.classList.remove('hidden');
                dom.userContainer.classList.add('hidden');
            }
            // Ensure loader is hidden
            showLoader(false);
        });

        // ================================================================
        //  START – hide loader after 5s max
        // ================================================================
        setTimeout(() => showLoader(false), 5000);
        console.log('🏁 Minimal auth app ready.');
    </script>

</body>
</html>
