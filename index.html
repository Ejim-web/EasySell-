<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EasySell - Flutterwave Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --bg-primary: #0d0d0d; --bg-secondary: #1a1a1a; --bg-card: #242424; --bg-input: #2a2a2a;
            --text-primary: #f0f0f0; --text-secondary: #aaa; --text-muted: #666;
            --accent: #00b16a; --accent-hover: #00995a; --accent-glow: rgba(0,177,106,0.25);
            --border-color: #333; --shadow: 0 8px 32px rgba(0,0,0,0.6); --radius:16px; --radius-sm:10px;
            --transition:0.25s ease; --nav-height:68px; --header-height:64px; --whatsapp:#25D366;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); padding-bottom: calc(var(--nav-height) + 24px); padding-top: var(--header-height); min-height: 100vh; overflow-x: hidden; }
        .hidden { display:none !important; }
        .flex { display:flex; }
        .items-center { align-items:center; }
        .gap-1 { gap:8px; }
        .w-full { width:100%; }
        .text-accent { color:var(--accent); }
        .text-muted { color:var(--text-muted); }
        .text-sm { font-size:0.85rem; }
        .btn-sm { padding:8px 16px; font-size:0.8rem; width:auto; }
        .mt-1 { margin-top:8px; }
        .mb-1 { margin-bottom:8px; }
        .mb-2 { margin-bottom:16px; }
        .btn { padding:12px 24px; border-radius:var(--radius-sm); font-weight:600; font-size:0.95rem; transition:all var(--transition); display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; background:var(--bg-input); color:var(--text-primary); width:100%; cursor:pointer; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:var(--accent-hover); box-shadow:0 4px 20px var(--accent-glow); }
        .btn-outline { background:transparent; border:1px solid var(--border-color); }
        .btn-danger { background:#e74c3c; color:#fff; }
        .btn-whatsapp { background:var(--whatsapp); color:#fff; }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        .toast-container { position:fixed; top:80px; right:16px; left:16px; z-index:10000; display:flex; flex-direction:column; gap:8px; pointer-events:none; max-width:400px; margin:0 auto; }
        .toast { pointer-events:auto; background:var(--bg-card); border:1px solid var(--border-color); border-left:4px solid var(--accent); padding:14px 18px; border-radius:var(--radius-sm); color:var(--text-primary); font-size:0.9rem; box-shadow:var(--shadow); animation:slideDown 0.3s ease; display:flex; align-items:center; gap:12px; }
        .toast.error { border-left-color:#e74c3c; }
        .toast.success { border-left-color:var(--accent); }
        @keyframes slideDown { from { opacity:0; transform:translateY(-20px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
        .loading-overlay { position:fixed; inset:0; background:rgba(13,13,13,0.8); display:flex; align-items:center; justify-content:center; z-index:9999; backdrop-filter:blur(4px); }
        .loading-overlay .spinner { width:48px; height:48px; border:4px solid var(--bg-input); border-top:4px solid var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .header { position:fixed; top:0; left:0; right:0; height:var(--header-height); background:var(--bg-secondary); border-bottom:1px solid var(--border-color); display:flex; align-items:center; padding:0 16px; z-index:100; gap:12px; backdrop-filter:blur(12px); background:rgba(26,26,26,0.92); }
        .header .logo { font-size:1.4rem; font-weight:800; display:flex; align-items:center; gap:6px; }
        .header .logo i { color:var(--accent); }
        .header-search { flex:1; min-width:0; background:var(--bg-input); border-radius:24px; padding:0 14px; display:flex; align-items:center; gap:8px; border:1px solid transparent; transition:border var(--transition); }
        .header-search:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
        .header-search input { flex:1; background:transparent; padding:10px 0; font-size:0.9rem; min-width:0; color:var(--text-primary); border:none; outline:none; }
        .header-search input::placeholder { color:var(--text-muted); }
        .header-actions { display:flex; align-items:center; gap:6px; }
        .header-actions button { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:var(--text-secondary); transition:background var(--transition), color var(--transition); background:transparent; border:none; }
        .header-actions .avatar-btn { width:36px; height:36px; border-radius:50%; background:var(--accent); color:#fff; font-weight:700; font-size:0.9rem; display:flex; align-items:center; justify-content:center; border:2px solid transparent; transition:border var(--transition); }
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-height); background:var(--bg-secondary); border-top:1px solid var(--border-color); display:flex; align-items:center; justify-content:space-around; z-index:100; padding:0 8px; backdrop-filter:blur(12px); background:rgba(26,26,26,0.94); }
        .bottom-nav .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; font-size:0.6rem; color:var(--text-muted); padding:4px 12px; border-radius:var(--radius-sm); transition:color var(--transition); position:relative; background:transparent; border:none; cursor:pointer; }
        .bottom-nav .nav-item i { font-size:1.4rem; }
        .bottom-nav .nav-item.active { color:var(--accent); }
        .bottom-nav .nav-item .badge { position:absolute; top:0; right:4px; background:#e74c3c; color:#fff; font-size:0.55rem; font-weight:700; padding:1px 6px; border-radius:10px; min-width:18px; text-align:center; }
        .bottom-nav .sell-btn { background:var(--accent); color:#fff; width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; margin-top:-18px; box-shadow:0 4px 20px var(--accent-glow); transition:transform var(--transition), box-shadow var(--transition); z-index:10; border:none; cursor:pointer; }
        .bottom-nav .sell-btn:active { transform:scale(0.92); }
        .page { display:none; padding:16px; padding-bottom:20px; animation:fadeUp 0.3s ease; }
        .page.active { display:block; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .product-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-top:8px; }
        @media (min-width:500px){ .product-grid { grid-template-columns:repeat(3,1fr); } }
        @media (min-width:768px){ .product-grid { grid-template-columns:repeat(4,1fr); } }
        .product-card { background:var(--bg-card); border-radius:var(--radius); overflow:hidden; border:1px solid var(--border-color); cursor:pointer; position:relative; transition:transform 0.15s; }
        .product-card:active { transform:scale(0.97); }
        .product-card .img-wrap { position:relative; padding-top:100%; background:var(--bg-input); overflow:hidden; }
        .product-card .img-wrap img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
        .product-card .img-wrap .img-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:2rem; background:var(--bg-input); }
        .product-card .card-badge { position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); padding:2px 10px; border-radius:12px; font-size:0.6rem; font-weight:600; color:#fff; border:1px solid rgba(255,255,255,0.08); }
        .product-card .card-wishlist { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.9rem; border:none; transition:all var(--transition); }
        .product-card .card-wishlist.liked { color:#e74c3c; background:rgba(231,76,60,0.2); }
        .product-card .whatsapp-btn { position:absolute; bottom:8px; right:8px; background:var(--whatsapp); color:#fff; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; box-shadow:0 2px 12px rgba(37,211,102,0.4); border:none; z-index:5; cursor:pointer; }
        .product-card .card-body { padding:10px 12px 12px; }
        .product-card .card-body .title { font-weight:600; font-size:0.85rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .product-card .card-body .price { font-weight:700; font-size:1.05rem; color:var(--accent); margin-top:4px; }
        .product-card .card-body .meta { display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-muted); margin-top:4px; }
        .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
        .empty-state i { font-size:3rem; color:var(--border-color); margin-bottom:16px; }
        .empty-state h3 { color:var(--text-secondary); margin-bottom:6px; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
        .modal-overlay.open { opacity:1; pointer-events:auto; }
        .modal-overlay .modal { background:var(--bg-secondary); border-radius:var(--radius) var(--radius) 0 0; max-width:560px; width:100%; max-height:92vh; overflow-y:auto; padding:20px 20px 28px; transform:translateY(30px); transition:transform 0.3s ease; border-top:1px solid var(--border-color); }
        .modal-overlay.open .modal { transform:translateY(0); }
        .modal .modal-handle { width:48px; height:4px; background:var(--border-color); border-radius:4px; margin:0 auto 16px; }
        .modal .modal-title { font-size:1.2rem; font-weight:700; margin-bottom:16px; }
        .modal .modal-close { float:right; background:var(--bg-input); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:var(--text-secondary); border:none; cursor:pointer; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:0.8rem; font-weight:600; margin-bottom:4px; color:var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 14px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:0.95rem; transition:border var(--transition), box-shadow var(--transition); color:var(--text-primary); }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
        .profile-header { display:flex; align-items:center; gap:16px; padding:16px 0; border-bottom:1px solid var(--border-color); margin-bottom:16px; }
        .profile-header .avatar { width:64px; height:64px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; color:#fff; flex-shrink:0; }
        .profile-menu { display:flex; flex-direction:column; gap:4px; }
        .profile-menu .menu-item { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--radius-sm); background:var(--bg-card); border:1px solid var(--border-color); transition:all var(--transition); color:var(--text-primary); cursor:pointer; }
        .profile-menu .menu-item:hover { border-color:var(--accent); background:var(--bg-input); }
        .profile-menu .menu-item i { width:24px; color:var(--accent); font-size:1.1rem; }
        .profile-menu .menu-item .arrow { margin-left:auto; color:var(--text-muted); font-size:0.8rem; }
        .profile-menu .menu-item.danger { color:#e74c3c; }
        .profile-menu .menu-item.danger i { color:#e74c3c; }
        .detail-price { font-size:1.6rem; font-weight:800; color:var(--accent); }
        .detail-title { font-size:1.2rem; font-weight:700; margin:4px 0 8px; }
        .detail-meta { display:flex; flex-wrap:wrap; gap:12px; font-size:0.8rem; color:var(--text-muted); margin-bottom:12px; }
        .detail-meta i { margin-right:4px; color:var(--accent); }
        .detail-desc { color:var(--text-secondary); line-height:1.6; font-size:0.95rem; margin-bottom:16px; white-space:pre-wrap; }
        .detail-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .detail-actions .btn { flex:1; min-width:100px; }
        .order-card { background:var(--bg-card); border-radius:var(--radius); padding:14px; margin-bottom:12px; border:1px solid var(--border-color); }
        .order-card .status { font-size:0.85rem; margin-top:4px; }
        .order-actions { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
        .balance-card { background:var(--bg-card); border-radius:var(--radius-sm); padding:12px; border:1px solid var(--border-color); text-align:center; }
        .balance-card .amount { font-size:1.2rem; font-weight:700; color:var(--accent); }
        .balance-card .currency { font-size:0.7rem; color:var(--text-muted); }
        .quick-action { flex:1; min-width:120px; }
        .auth-tabs { display:flex; gap:4px; background:var(--bg-input); border-radius:var(--radius-sm); padding:4px; margin-bottom:20px; }
        .auth-tabs button { flex:1; padding:10px; border-radius:var(--radius-sm); font-weight:600; font-size:0.9rem; transition:all var(--transition); color:var(--text-muted); background:transparent; border:none; cursor:pointer; }
        .auth-tabs button.active { background:var(--accent); color:#fff; }
        .auth-divider { display:flex; align-items:center; gap:12px; margin:16px 0; color:var(--text-muted); font-size:0.8rem; }
        .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--border-color); }
        .zoom-modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:999; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s ease; padding:20px; }
        .zoom-modal.open { opacity:1; pointer-events:auto; }
        .zoom-modal img { max-width:100%; max-height:90vh; object-fit:contain; border-radius:var(--radius-sm); }
        .zoom-modal .zoom-close { position:fixed; top:20px; right:20px; color:#fff; font-size:2rem; cursor:pointer; width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.2); transition:background var(--transition); z-index:1000; }
        .whatsapp-float { position:fixed; bottom:calc(var(--nav-height) + 20px); right:20px; background:var(--whatsapp); color:#fff; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; box-shadow:0 4px 20px rgba(37,211,102,0.5); z-index:50; border:none; cursor:pointer; }
        .category-chip { flex-shrink:0; background:var(--bg-card); padding:8px 16px; border-radius:24px; font-size:0.8rem; display:flex; align-items:center; gap:8px; border:1px solid var(--border-color); transition:all var(--transition); color:var(--text-secondary); white-space:nowrap; cursor:pointer; }
        .category-chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .category-chip i { font-size:1rem; color:var(--accent); }
        .category-chip.active i { color:#fff; }
        .scroll-trigger { height:20px; margin-top:8px; display:flex; justify-content:center; align-items:center; color:var(--text-muted); font-size:0.8rem; }
        @media (max-width:480px){ .product-grid { gap:10px; } .header .logo { font-size:1.1rem; } .bottom-nav .nav-item { padding:4px 6px; font-size:0.5rem; } .bottom-nav .nav-item i { font-size:1.2rem; } .bottom-nav .sell-btn { width:44px; height:44px; font-size:1.3rem; margin-top:-14px; } }
        @media (min-width:768px){ .modal-overlay .modal { border-radius:var(--radius); margin-bottom:40px; max-height:80vh; } .modal-overlay { align-items:center; } }
    </style>
</head>
<body>

    <div id="globalLoader" class="loading-overlay"><div class="spinner"></div></div>
    <div id="toastContainer" class="toast-container"></div>

    <!-- Zoom Modal -->
    <div class="zoom-modal" id="zoomModal" onclick="closeZoom()">
        <button class="zoom-close" onclick="closeZoom()"><i class="fas fa-times"></i></button>
        <img id="zoomImage" src="" alt="Zoom" />
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo"><i class="fas fa-store-alt"></i> Easy<span>Sell</span></div>
        <div class="header-search">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search products..." />
        </div>
        <div class="header-actions">
            <button id="themeToggle"><i class="fas fa-moon"></i></button>
            <button id="authModalTrigger" class="avatar-btn"><i class="fas fa-user"></i></button>
        </div>
    </header>

    <!-- Bottom Nav -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" data-page="wishlist"><i class="fas fa-heart"></i><span>Wishlist</span><span class="badge hidden" id="wishlistBadge">0</span></button>
        <button class="sell-btn" id="floatingSellBtn"><i class="fas fa-plus"></i></button>
        <button class="nav-item" data-page="orders"><i class="fas fa-shopping-bag"></i><span>Orders</span></button>
        <button class="nav-item" data-page="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></button>
    </nav>

    <button class="whatsapp-float" onclick="window.open('https://wa.me/2348000000000?text=Hello%20EasySell!','_blank')"><i class="fab fa-whatsapp"></i></button>

    <!-- Pages -->
    <main id="pageHome" class="page active">
        <div id="categoryScroll" style="display:flex;gap:12px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;">
            <button class="category-chip active" data-category="all"><i class="fas fa-th"></i> All</button>
            <button class="category-chip" data-category="electronics"><i class="fas fa-mobile-alt"></i> Electronics</button>
            <button class="category-chip" data-category="fashion"><i class="fas fa-tshirt"></i> Fashion</button>
            <button class="category-chip" data-category="furniture"><i class="fas fa-couch"></i> Furniture</button>
            <button class="category-chip" data-category="vehicles"><i class="fas fa-car"></i> Vehicles</button>
            <button class="category-chip" data-category="property"><i class="fas fa-home"></i> Property</button>
            <button class="category-chip" data-category="other"><i class="fas fa-tag"></i> Other</button>
        </div>
        <div style="display:flex;gap:8px;margin:4px 0 12px;flex-wrap:wrap;">
            <select id="filterPrice" style="flex:1;min-width:80px;padding:8px 10px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.8rem;">
                <option value="all">All Prices</option>
                <option value="low">Low → High</option>
                <option value="high">High → Low</option>
            </select>
            <select id="filterCondition" style="flex:1;min-width:80px;padding:8px 10px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.8rem;">
                <option value="all">All Cond.</option>
                <option value="new">New</option>
                <option value="used">Used</option>
            </select>
            <select id="filterLocation" style="flex:1;min-width:80px;padding:8px 10px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.8rem;">
                <option value="all">All Locations</option>
                <option value="Lagos">Lagos</option>
                <option value="Abuja">Abuja</option>
                <option value="Port Harcourt">Port Harcourt</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div id="productGrid" class="product-grid"></div>
        <div id="scrollTrigger" class="scroll-trigger">—</div>
    </main>

    <section id="pageWishlist" class="page">
        <h2><i class="fas fa-heart text-accent"></i> Wishlist</h2>
        <div id="wishlistGrid" class="product-grid"></div>
        <div id="wishlistEmpty" class="empty-state"><i class="fas fa-heart"></i><h3>No saved items</h3><p class="text-muted">Start adding products you love.</p></div>
    </section>

    <section id="pageOrders" class="page">
        <h2><i class="fas fa-shopping-bag text-accent"></i> My Orders</h2>
        <div id="ordersList"></div>
        <div id="ordersEmpty" class="empty-state"><i class="fas fa-shopping-bag"></i><h3>No orders yet</h3><p class="text-muted">Buy something to see it here.</p></div>
    </section>

    <section id="pageDashboard" class="page">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2><i class="fas fa-chart-pie text-accent"></i> Dashboard</h2>
            <div style="font-size:0.8rem;color:var(--text-muted);"><i class="fas fa-sync-alt" onclick="loadDashboard()" style="cursor:pointer;"></i></div>
        </div>
        <div id="dashboardGreeting" style="margin-bottom:16px;">
            <h3 style="font-size:1.1rem;">Hello <span id="sellerName">User</span> 🐊</h3>
        </div>
        <div id="balanceCards" style="display:grid;grid-template-columns:repeat(auto-fit, minmax(140px,1fr));gap:10px;margin-bottom:16px;"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
            <button class="btn btn-outline btn-sm" onclick="viewAllBalances()" style="width:auto;"><i class="fas fa-chevron-right"></i> View all balances</button>

        <div class="modal">
            <button class="modal-close" id="sellModalClose"><i class="fas fa-times"></i></button>

            <div class="modal-title"><i class="fas fa-plus-circle text-accent"></i> Sell an Item</div>
            <form id="sellForm" class="sell-form">
                <div class="form-group"><label>Title *</label><input type="text" id="sellTitle" placeholder="e.g. iPhone 13 Pro" required /></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group"><label>Price (₦) *</label><input type="number" id="sellPrice" placeholder="50000" required min="0" /></div>
                    <div class="form-group"><label>Category *</label><select id="sellCategory" required>
                        <option value="electronics">Electronics</option><option value="fashion">Fashion</option>

        <div class="modal">
            <button class="modal-close" id="sellerModalClose"><i class="fas fa-times"></i></button>
            <div class="modal-handle"></div>
            <div id="sellerContent"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAAWF9XukiN4nuA7LlbsaU2qiZgzTGM3FE",
            authDomain: "easysell-75318.firebaseapp.com",
            projectId: "easysell-75318",
            storageBucket: "easysell-75318.firebasestorage.app",
            messagingSenderId: "81916821182",
            appId: "1:81916821182:web:46064186708cec62eba8ef"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const functions = firebase.functions();

        // ============================================================
        //  STATE
        // ============================================================
        const state = {
            products: [],
            wishlist: [],
            currentUser: null,
            currentCategory: 'all',
            searchQuery: '',
            sortPrice: 'all',
            filterCondition: 'all',
            filterLocation: 'all',
            pageSize: 12,
            lastDoc: null,
            allLoaded: false,
            loading: false
        };

        // ============================================================
        //  DOM REFS
        // ============================================================
        const $ = s => document.querySelector(s);
        const $$ = s => document.querySelectorAll(s);
        const dom = {
            loader: $('#globalLoader'),
            toast: $('#toastContainer'),
            search: $('#searchInput'),
            grid: $('#productGrid'),
            scrollTrigger: $('#scrollTrigger'),
            filterPrice: $('#filterPrice'),
            filterCondition: $('#filterCondition'),
            filterLocation: $('#filterLocation'),
            navItems: $$('.bottom-nav .nav-item'),
            sellBtn: $('#floatingSellBtn'),
            pageHome: $('#pageHome'),
            pageWishlist: $('#pageWishlist'),
            pageOrders: $('#pageOrders'),
            pageDashboard: $('#pageDashboard'),
            pageProfile: $('#pageProfile'),
            wishlistGrid: $('#wishlistGrid'),
            wishlistEmpty: $('#wishlistEmpty'),
            wishlistBadge: $('#wishlistBadge'),
            authModal: $('#authModal'),
            authModalTrigger: $('#authModalTrigger'),
            authModalClose: $('#authModalClose'),
            loginForm: $('#loginForm'),
            signupForm: $('#signupForm'),
            loginEmail: $('#loginEmail'),
            loginPassword: $('#loginPassword'),
            signupName: $('#signupName'),
            signupEmail: $('#signupEmail'),
            signupPassword: $('#signupPassword'),
            authForm: $('#authForm'),
            googleBtn: $('#googleAuthBtn'),
            detailModal: $('#detailModal'),
            detailModalClose: $('#detailModalClose'),
            detailContent: $('#detailContent'),
            sellModal: $('#sellModal'),
            sellModalClose: $('#sellModalClose'),
            sellForm: $('#sellForm'),
            sellTitle: $('#sellTitle'),
            sellPrice: $('#sellPrice'),
            sellCategory: $('#sellCategory'),
            sellCondition: $('#sellCondition'),
            sellLocation: $('#sellLocation'),
            sellWhatsApp: $('#sellWhatsApp'),
            sellDescription: $('#sellDescription'),
            sellSubmitBtn: $('#sellSubmitBtn'),
            sellEditId: $('#sellEditId'),
            sellerModal: $('#sellerModal'),
            sellerModalClose: $('#sellerModalClose'),
            sellerContent: $('#sellerContent'),
            themeToggle: $('#themeToggle'),
            profileContent: $('#profileContent'),
            ordersList: $('#ordersList'),
            ordersEmpty: $('#ordersEmpty'),
            categoryScroll: $('#categoryScroll'),
            balanceCards: $('#balanceCards'),
            recentTransactions: $('#recentTransactions'),
            sellerName: $('#sellerName')
        };

        // ============================================================
        //  HELPERS
        // ============================================================
        function showToast(msg, type = 'success') {
            const container = dom.toast;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function showLoader(show) { dom.loader.classList.toggle('hidden', !show); }

        function debounce(fn, delay) { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); }; }

        // ============================================================
        //  AUTH
        // ============================================================
        function updateAuthUI(user) {
            state.currentUser = user;
            const avatarBtn = dom.authModalTrigger;
            if (user) {
                const name = user.displayName || user.email || 'User';
                avatarBtn.innerHTML = `<span>${name.charAt(0).toUpperCase()}</span>`;
                avatarBtn.style.background = 'var(--accent)';
                avatarBtn.style.color = '#fff';
            } else {
                avatarBtn.innerHTML = '<i class="fas fa-user"></i>';
                avatarBtn.style.background = '';
                avatarBtn.style.color = '';
            }
            if (dom.authModal.classList.contains('open')) dom.authModal.classList.remove('open');
            loadProducts(true);
            renderProfile();
            renderWishlist();
            if (user) loadTransactions();
        }
        auth.onAuthStateChanged(user => {
            updateAuthUI(user);
            if (user) { loadUserWishlist(); }
            showLoader(false);
        });

        dom.authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const isLogin = !dom.loginForm.classList.contains('hidden');
            try {
                showLoader(true);
                if (isLogin) {
                    await auth.signInWithEmailAndPassword(dom.loginEmail.value.trim(), dom.loginPassword.value);
                    showToast('Welcome back!');
                } else {
                    const cred = await auth.createUserWithEmailAndPassword(dom.signupEmail.value.trim(), dom.signupPassword.value);
                    await cred.user.updateProfile({ displayName: dom.signupName.value.trim() });
                    await db.collection('users').doc(cred.user.uid).set({
                        displayName: dom.signupName.value.trim(),
                        email: dom.signupEmail.value.trim(),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showToast('Account created!');
                }
                dom.authModal.classList.remove('open');
            } catch (err) { showToast(err.message, 'error'); } finally { showLoader(false); }
        });

        dom.googleBtn.addEventListener('click', async () => {
            try {
                showLoader(true);
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        displayName: user.displayName || 'User',
                        email: user.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                showToast('Signed in!');
                dom.authModal.classList.remove('open');
            } catch (err) { showToast(err.message, 'error'); } finally { showLoader(false); }
        });

        dom.authTabs = $$('.auth-tabs button');
        dom.authTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                dom.authTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const isLogin = tab.dataset.tab === 'login';
                dom.loginForm.classList.toggle('hidden', !isLogin);
                dom.signupForm.classList.toggle('hidden', isLogin);
            });
        });

        dom.authModalTrigger.addEventListener('click', () => {
            if (state.currentUser) { navigateTo('profile'); return; }
            dom.authModal.classList.add('open');
        });
        dom.authModalClose.addEventListener('click', () => dom.authModal.classList.remove('open'));
        dom.authModal.addEventListener('click', (e) => { if (e.target === dom.authModal) dom.authModal.classList.remove('open'); });

        function logoutUser() {
            auth.signOut().then(() => { showToast('Logged out');
                state.wishlist = [];
                renderWishlist();
                renderProfile(); }).catch(err => showToast(err.message, 'error'));
        }

        // ============================================================
        //  NAVIGATION
        // ============================================================
        function navigateTo(page) {
            state.currentPage = page;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const map = { home: dom.pageHome, wishlist: dom.pageWishlist, orders: dom.pageOrders, dashboard: dom.pageDashboard, profile: dom.pageProfile };
            if (map[page]) map[page].classList.add('active');
            dom.navItems.forEach(item => item.classList.toggle('active', item.dataset.page === page));
            if (page === 'wishlist') renderWishlist();
            if (page === 'profile') renderProfile();
            if (page === 'orders') loadTransactions();
            if (page === 'dashboard') loadDashboard();
            if (page === 'home') loadProducts(true);
        }
        dom.navItems.forEach(item => item.addEventListener('click', () => navigateTo(item.dataset.page)));

        // ============================================================
        //  PRODUCTS
        // ============================================================
        async function loadProducts(reset = true) {
            if (state.loading) return;
            if (reset) { state.lastDoc = null; state.products = []; state.allLoaded = false; dom.grid.innerHTML = ''; }
            if (state.allLoaded) return;
            if (!state.currentUser) {
                dom.grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fas fa-store-alt"></i>
                        <h3>Sign in to see listings</h3>
                        <button class="btn btn-primary mt-1" onclick="dom.authModal.classList.add('open')" style="max-width:200px;margin:12px auto 0;">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </div>`;
                return;
            }
            state.loading = true;
            dom.scrollTrigger.textContent = 'Loading...';
            try {
                let query = db.collection('products').where('status', '==', 'available')
                    .orderBy('createdAt', 'desc')
                    .limit(state.pageSize);
                if (state.lastDoc && !reset) query = query.startAfter(state.lastDoc);
                const snap = await query.get();
                const docs = [];
                snap.forEach(d => docs.push({ id: d.id, ...d.data() }));
                if (docs.length < state.pageSize) state.allLoaded = true;
                if (docs.length > 0) state.lastDoc = snap.docs[snap.docs.length - 1];

                let filtered = docs;
                const search = state.searchQuery.toLowerCase().trim();
                if (search) filtered = filtered.filter(p => (p.title || '').toLowerCase().includes(search));
                if (state.currentCategory !== 'all') filtered = filtered.filter(p => p.category === state.currentCategory);
                if (state.filterCondition !== 'all') filtered = filtered.filter(p => p.condition === state.filterCondition);
                if (state.filterLocation !== 'all') filtered = filtered.filter(p => p.location === state.filterLocation);
                if (state.sortPrice === 'low') filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
                else if (state.sortPrice === 'high') filtered.sort((a, b) => (b.price || 0) - (a.price || 0));

                if (reset) state.products = filtered;
                else state.products = [...state.products, ...filtered];
                renderProducts(state.products);
                dom.scrollTrigger.textContent = state.allLoaded ? '— All loaded —' : 'Load more...';
            } catch (err) { console.error(err); dom.scrollTrigger.textContent = '— Error —'; } finally { state.loading = false; }
        }

        function renderProducts(products) {
            const grid = dom.grid;
            if (!products || products.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-box-open"></i><h3>No listings found</h3></div>`;
                return;
            }
            let html = '';
            products.forEach(p => {
                const imgUrl = p.imageUrls && p.imageUrls.length > 0 ? p.imageUrls[0] : '';
                const isWishlisted = state.wishlist.includes(p.id);
                const priceStr = `₦${(p.price || 0).toFixed(2)}`;
                html += `
                    <div class="product-card" data-id="${p.id}" onclick="openDetail('${p.id}')">
                        <div class="img-wrap">
                            ${imgUrl ? `<img src="${imgUrl}" alt="${p.title || 'Item'}" loading="lazy" onclick="event.stopPropagation();openZoom('${imgUrl}')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` : ''}
                            <div class="img-placeholder" style="${imgUrl ? 'display:none;' : ''}"><i class="fas fa-image"></i></div>
                            <span class="card-badge">${p.condition || 'Used'}</span>
                            <button class="card-wishlist ${isWishlisted ? 'liked' : ''}" onclick="toggleWishlist('${p.id}', event)"><i class="fas fa-heart"></i></button>
                            ${p.whatsapp ? `<a href="https://wa.me/${p.whatsapp.replace(/\D/g,'')}?text=Hi..." target="_blank" class="whatsapp-btn" onclick="event.stopPropagation();"><i class="fab fa-whatsapp"></i></a>` : ''}
                        </div>
                        <div class="card-body">
                            <div class="title">${p.title || 'Untitled'}</div>
                            <div class="price">${priceStr}</div>
                            <div class="meta"><span><i class="fas fa-map-marker-alt"></i> ${p.location || 'N/A'}</span><span><i class="fas fa-clock"></i> ${p.createdAt ? 'recent' : ''}</span></div>
                        </div>
                    </div>`;
            });
            grid.innerHTML = html;
        }

        // ============================================================
        //  WISHLIST
        // ============================================================
        async function loadUserWishlist() {
            if (!state.currentUser) return;
            try {
                const doc = await db.collection('users').doc(state.currentUser.uid).get();
                state.wishlist = doc.exists ? doc.data().wishlist || [] : [];
                renderWishlist();
                updateWishlistBadge();
            } catch (err) { state.wishlist = []; }
        }

        async function toggleWishlist(productId, event) {
            if (event) event.stopPropagation();
            if (!state.currentUser) { showToast('Sign in to save', 'error');
                dom.authModal.classList.add('open'); return; }
            const idx = state.wishlist.indexOf(productId);
            if (idx > -1) state.wishlist.splice(idx, 1);
            else state.wishlist.push(productId);
            try {
                await db.collection('users').doc(state.currentUser.uid).set({ wishlist: state.wishlist }, { merge: true });
                renderWishlist();
                updateWishlistBadge();
                renderProducts(state.products);
                showToast(idx > -1 ? 'Removed' : 'Added');
            } catch (err) { showToast(err.message, 'error'); }
        }

        function renderWishlist() {
            const grid = dom.wishlistGrid;
            const empty = dom.wishlistEmpty;
            const items = state.products.filter(p => state.wishlist.includes(p.id));
            if (items.length === 0) { grid.innerHTML = '';
                empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            let html = '';
            items.forEach(p => {
                const imgUrl = p.imageUrls && p.imageUrls.length > 0 ? p.imageUrls[0] : '';
                html += `
                    <div class="product-card" onclick="openDetail('${p.id}')">
                        <div class="img-wrap">
                            ${imgUrl ? `<img src="${imgUrl}" alt="${p.title}" loading="lazy" onclick="event.stopPropagation();openZoom('${imgUrl}')" />` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);"><i class="fas fa-image"></i></div>`}
                            <button class="card-wishlist liked" onclick="toggleWishlist('${p.id}', event)"><i class="fas fa-heart"></i></button>
                        </div>
                        <div class="card-body"><div class="title">${p.title}</div><div class="price">₦${(p.price||0).toFixed(2)}</div></div>
                    </div>`;
            });
            grid.innerHTML = html;
        }

        function updateWishlistBadge() {
            const badge = dom.wishlistBadge;
            if (state.wishlist.length > 0) { badge.textContent = state.wishlist.length;
                badge.classList.remove('hidden'); } else badge.classList.add('hidden');
        }

        // ============================================================
        //  ZOOM
        // ============================================================
        function openZoom(src) {
            document.getElementById('zoomImage').src = src;
            document.getElementById('zoomModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeZoom() {
            document.getElementById('zoomModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        // ============================================================
        //  PRODUCT DETAIL
        // ============================================================
        function openDetail(productId) {
            const p = state.products.find(x => x.id === productId);
            if (!p) return;
            const content = dom.detailContent;
            const isOwner = state.currentUser && p.sellerId === state.currentUser.uid;
            const images = p.imageUrls || [];
            let carouselHtml = '';
            if (images.length > 0) {
                carouselHtml = `
                    <div class="detail-carousel">
                        <div class="carousel-track">
                            ${images.map(url => `<img src="${url}" alt="Product" onclick="event.stopPropagation();openZoom('${url}')" />`).join('')}
                        </div>
                    </div>`;
            } else {
                carouselHtml =
                    `<div class="detail-carousel" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);"><i class="fas fa-image" style="font-size:3rem;"></i></div>`;
            }
            content.innerHTML = `
                ${carouselHtml}
                <div class="detail-price">₦${(p.price||0).toFixed(2)}</div>
                <div class="detail-title">${p.title}</div>
                <div class="detail-meta">
                    <span><i class="fas fa-tag"></i> ${p.category || 'Other'}</span>
                    <span><i class="fas fa-check-circle"></i> ${p.condition || 'Used'}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${p.location || 'N/A'}</span>
                    <span><i class="fas fa-user"></i> ${p.sellerName || 'Anonymous'}</span>
                </div>
                ${p.description ? `<div class="detail-desc">${p.description}</div>` : ''}
                <div class="detail-actions">
                    ${isOwner ? `
                        <button class="btn btn-primary" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i> Delete</button>
                    ` : `
                        ${p.status === 'available' ? `
                            <button class="btn btn-primary" onclick="handleBuyNow('${p.id}')">
                                <i class="fas fa-lock"></i> Buy Now – ₦${(p.price||0).toFixed(2)}
                            </button>
                        ` : `<button class="btn btn-outline" disabled><i class="fas fa-times-circle"></i> Sold</button>`}
                        <button class="btn btn-outline" onclick="viewSellerProfile('${p.sellerId}')"><i class="fas fa-user"></i> Seller</button>
                        ${p.whatsapp ? `<a href="https://wa.me/${p.whatsapp.replace(/\D/g,'')}?text=Hi..." target="_blank" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>` : ''}
                    `}
                </div>
            `;
            dom.detailModal.classList.add('open');
        }

        dom.detailModalClose.addEventListener('click', () => dom.detailModal.classList.remove('open'));
        dom.detailModal.addEventListener('click', (e) => { if (e.target === dom.detailModal) dom.detailModal.classList.remove('open'); });

        // ============================================================
        //  SELLER PROFILE
        // ============================================================
        async function viewSellerProfile(sellerId) {
            try {
                showLoader(true);
                const snap = await db.collection('users').doc(sellerId).get();
                const data = snap.exists ? snap.data() : {};
                const name = data.displayName || 'Anonymous';
                const prodSnap = await db.collection('products').where('sellerId', '==', sellerId).where('status', '==',

        // ---- BUY NOW ----
        async function handleBuyNow(productId) {
            if (!state.currentUser) {
                showToast('Sign in to buy', 'error');
                dom.authModal.classList.add('open');
                return;
            }
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            // Check seller has bank account
            try {
                const sellerSnap = await db.collection('users').doc(product.sellerId).get();
                const seller = sellerSnap.data();
                if (!seller.bankAccount || !seller.bankAccount.accountNumber) {
                    showToast('Seller has not added bank details. Contact them directly.', 'error');
                    return;
                }
            } catch (err) { showToast('Error checking seller details', 'error'); return; }

            if (!confirm(`Buy this item for ₦${(product.price || 0).toFixed(2)}? Payment will be held until you confirm delivery.`)) return;

            try {
                showLoader(true);
                const initPayment = functions.httpsCallable('initializeFlutterwavePayment');
                const result = await initPayment({ productId });
                const { paymentLink, transactionId } = result.data;

                // Open Flutterwave checkout in new window
                const win = window.open(paymentLink, '_blank');
                if (!win) window.location.href = paymentLink;

                showToast('Payment initiated. Complete in the new window.', 'info');
                dom.detailModal.classList.remove('open');

                // Poll for status update
                const checkInterval = setInterval(async () => {
                    const txSnap = await db.collection('transactions').doc(transactionId).get();
                    if (txSnap.exists) {
                        const tx = txSnap.data();
                        if (tx.status === 'paid_held') {
                            clearInterval(checkInterval);
                            showToast('✅ Payment confirmed! Money held. Seller will ship soon.', 'success');
                            navigateTo('orders');
                            await loadTransactions();
                        } else if (tx.status === 'completed' || tx.status === 'refunded') {
                            clearInterval(checkInterval);
                        }
                    }
                }, 5000);
                setTimeout(() => clearInterval(checkInterval), 300000);

            } catch (err) {
                showToast('Payment initialization failed: ' + err.message, 'error');
            } finally {
                showLoader(false);
            }
        }

        // ---- ORDERS / TRANSACTIONS ----
        async function loadTransactions() {
            if (!state.currentUser) return;
            try {
                const snapshot = await db.collection('transactions')
                    .where('buyerId', '==', state.currentUser.uid)
                    .orderBy('createdAt', 'desc')
                    .get();
                const orders = [];
                snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));

                const container = dom.ordersList;
                const empty = dom.ordersEmpty;
                if (orders.length === 0) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                let html = '';
                for (const tx of orders) {
                    const prodSnap = await db.collection('products').doc(tx.productId).get();
                    const product = prodSnap.exists ? prodSnap.data() : { title: 'Deleted item' };
                    const statusMap = {
                        'pending': '⏳ Awaiting payment',
                        'paid_held': '💰 Paid (held) – Awaiting delivery',
                        'completed': '✅ Completed – funds released',
                        'disputed': '⚠️ Disputed – under review',
                        'refunded': '↩️ Refunded'
                    };
                    const statusText = statusMap[tx.status] || tx.status;
                    html += `
                        <div class="order-card">
                            <div style="display:flex;justify-content:space-between;align-items:start;">
                                <div>
                                    <strong>${product.title || 'Item'}</strong>
                                    <div class="text-muted text-sm">₦${(tx.amount || 0).toFixed(2)} (incl. ₦${(tx.platformFee || 0).toFixed(2)} fee)</div>
                                    <div class="status">Status: ${statusText}</div>
                                </div>
                                <div style="text-align:right;font-size:0.8rem;">${tx.createdAt?.toDate ? new Date(tx.createdAt.toDate()).toLocaleDateString() : 'N/A'}</div>
                            </div>
                            ${tx.status === 'paid_held' ? `
                                <div class="order-actions">
                                    <button class="btn btn-primary btn-sm" onclick="handleConfirmDelivery('${tx.id}')"><i class="fas fa-check-circle"></i> I received it</button>
                                    <button class="btn btn-danger btn-sm" onclick="handleDispute('${tx.id}')"><i class="fas fa-flag"></i> I didn't receive</button>
                                </div>
                            ` : ''}
                            ${tx.status === 'disputed' ? `<div class="text-sm" style="color:#e74c3c;margin-top:4px;">Reason: ${tx.disputeReason || 'N/A'}</div>` : ''}
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (err) {
                showToast('Error loading orders: ' + err.message, 'error');
            }
        }

        async function handleDispute(transactionId) {

            try {

                await db.collection('transactions').doc(transactionId).update({

                    disputeReason: reason,
                    disputedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Dispute filed. Admin will investigate.', 'info');
                await loadTransactions();
