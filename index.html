        // FLATTEN PLATFORMS FOR SEARCH
        // ============================================================
        let allPlatformsFlat = [];
        let platformCategories = [];
        for (const category in allPlatforms) {
            platformCategories.push({
                name: category,
                icon: category.split(' ')[0],
                count: allPlatforms[category].length
            });
            allPlatforms[category].forEach(p => {
                allPlatformsFlat.push({ 
                    ...p, 
                    category: category.replace(/[^a-zA-Z0-9 ]/g, '').trim()
                });
            });
        }

        function searchPlatforms(query) {
            if (!query || query.length < 1) return [];
            const q = query.toLowerCase().trim();
            return allPlatformsFlat.filter(p => 
                p.name.toLowerCase().includes(q) || 
                p.category.toLowerCase().includes(q) ||
                (p.url && p.url.toLowerCase().includes(q))
            );
        }

        function getPlatformsByCategory(category) {
            if (!category) return [];
            const catKey = Object.keys(allPlatforms).find(k => k.includes(category) || category.includes(k));
            return catKey ? allPlatforms[catKey] : [];
        }

        function showToast(msg, duration = 3000) {

            setTimeout(() => t.remove(), duration);

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function loadUserData() {
            if (!currentUser) return;
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    userData = doc.data();
                } else {
                    await db.collection('users').doc(currentUser.uid).set({
                        username: currentUser.email.split('@')[0],
                        email: currentUser.email,
                        points: 50,
                        totalPoints: 50,
                        streak: 0,
                        adsWatched: 0,
                        referrals: 0,
                        referralCode: Math.random().toString(36).substring(2, 8).toUpperCase(),
                        lastAdTime: null,
                        createdAt: new Date()
                    });
                    userData = { username: currentUser.email.split('@')[0], points: 50, totalPoints: 50, streak: 0, adsWatched: 0, referrals: 0 };
                }
            } catch(e) { console.error(e); }
        }

        async function updatePoints(amount, reason) {
            if (!currentUser) return;
            const newPoints = (userData?.points || 0) + amount;
            await db.collection('users').doc(currentUser.uid).update({ 
                points: newPoints, 
                totalPoints: (userData?.totalPoints || 0) + amount 
            });
            userData.points = newPoints;
            userData.totalPoints = (userData?.totalPoints || 0) + amount;
            if (reason) showToast(`🎉 +${amount} points! ${reason}`, 2000);
            renderApp();
        }

        async function loadProducts() {

            try {
                const q = db.collection("products").orderBy("timestamp", "desc");
                const querySnapshot = await q.get();
                const products = [];
                querySnapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });

                html += `

        function spinWheel() {
            if (!currentUser) { alert("Login first"); return; }
            const now = Date.now();
            if (now - lastSpinTime < SPIN_COOLDOWN) {
                const hoursLeft = Math.ceil((SPIN_COOLDOWN - (now - lastSpinTime)) / 3600000);
                alert(`⏳ Come back in ${hoursLeft} hours for your free spin!`);
                return;
            }
            const result = spinRewards[Math.floor(Math.random() * spinRewards.length)];
            lastSpinTime = now;
            if (result > 0) {
                updatePoints(result, "🎡 Spin wheel reward!");
            } else {
                showToast("😅 Better luck next time!", 2000);
            }
            renderApp();
        }

        async function claimDaily() {
            if (!currentUser) return;
            const today = new Date().toISOString().split('T')[0];
            const ref = db.collection('users').doc(currentUser.uid).collection('dailyClaims').doc(today);
            if ((await ref.get()).exists) return alert("Already claimed today!");
            let streak = (userData?.streak || 0) + 1;
            let reward = DAILY_REWARD + Math.floor(streak / 7) * 5;
            if (streak >= 30) reward = 100;
            await ref.set({ date: today });
            await db.collection('users').doc(currentUser.uid).update({
                points: (userData?.points || 0) + reward,
                totalPoints: (userData?.totalPoints || 0) + reward,
                streak: streak
            });
            await loadUserData();
            showToast(`🎉 +${reward} points! ${streak} day streak!`, 3000);
            renderApp();
        }

        async function watchRewardedAd() {
            if (!currentUser) return alert("Login first");
            if (isAdLoading) return;
            
            isAdLoading = true;
            const btn = document.getElementById('rewardedBtn');

                let countdown = 6;

                const timer = setInterval(() => {
                    countdown--;
                    if (countdownEl) countdownEl.textContent = countdown;
                    if (countdown <= 0) clearInterval(timer);
                }, 1000);
                
                await new Promise(resolve => setTimeout(resolve, 6000));
                
                if (adWindow && !adWindow.closed) {
                    adWindow.close();
                }
                
                hideAdOverlay();
                
                await db.collection('users').doc(currentUser.uid).update({
                    points: (userData?.points || 0) + AD_REWARD_POINTS,

                renderApp();
                showToast(`✅ +${AD_REWARD_POINTS} points! Ad watched.`, 3000);
                
            } catch (error) {
                console.error("Ad error:", error);
                hideAdOverlay();
                showToast("⏹️ Ad was not completed. No points awarded.", 3000);

                isAdLoading = false;

        // ============================================================

        async function renderApp() {
            const app = document.getElementById("appContainer");
            if (!app) return;

            await loadUserData();

            const tabContent = document.getElementById('tabContent');
            if (!tabContent) return;

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.removeEventListener('click', handleTabClick);
                btn.addEventListener('click', handleTabClick);
            });

            function handleTabClick(e) {
                currentTab = e.target.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderApp();
            }

            switch(currentTab) {
                case 'home':
                    tabContent.innerHTML = await renderHomeTab();
                    // Home tab event listeners
                    document.getElementById("dailyBtn")?.addEventListener('click', claimDaily);
                    document.getElementById("rewardedBtn")?.addEventListener('click', watchRewardedAd);
                    document.getElementById("withdrawBtn")?.addEventListener('click', requestWithdrawal);
                    document.getElementById("copyReferralBtn")?.addEventListener('click', () => {
                        const code = userData?.referralCode || currentUser?.uid?.substring(0, 8) || 'NONE';
                        navigator.clipboard.writeText(code);
                        showToast("📋 Code copied!", 1500);
                    });
                    
                    // Popular platforms click
                    document.querySelectorAll('.popular-card[data-url]').forEach(c => c.addEventListener('click', () => openUrl(c.dataset.url)));
                    
                    // Category click - show platforms in category
                    document.querySelectorAll('.category-card[data-category]').forEach(c => {
                        c.addEventListener('click', () => {
                            const category = c.dataset.category;
                            const platforms = getPlatformsByCategory(category);
                            const container = document.getElementById('searchResults');
                            if (platforms.length === 0) {
                                container.innerHTML = '<div class="no-results">No platforms found in this category.</div>';
                            } else {
                                container.innerHTML = platforms.map(p => `
                                    <div class="card" data-url="${p.url}" style="text-align:left; padding:0.5rem 1rem;">
                                        <span>${p.icon} ${p.name}</span>
                                        <span class="result-category">${category}</span>
                                    </div>
                                `).join('');
                                container.querySelectorAll('.card[data-url]').forEach(card => card.addEventListener('click', () => openUrl(card.dataset.url)));
                            }
                        });
                    });

                    // Search functionality
                    document.getElementById("searchBtn")?.addEventListener('click', () => {
                        const query = document.getElementById('searchInput').value;
                        const results = searchPlatforms(query);
                        const container = document.getElementById('searchResults');
                        if (results.length === 0) {
                            container.innerHTML = '<div class="no-results">No platforms found. Try a different search!</div>';
                        } else {
                            container.innerHTML = results.slice(0, 50).map(r => `
                                <div class="card" data-url="${r.url}" style="text-align:left; padding:0.5rem 1rem;">
                                    <span>${r.icon} ${r.name}</span>
                                    <span class="result-category">${r.category}</span>
                                </div>
                            `).join('');
                            container.querySelectorAll('.card[data-url]').forEach(card => card.addEventListener('click', () => openUrl(card.dataset.url)));
                        }
                    });
                    document.getElementById("searchInput")?.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') document.getElementById("searchBtn")?.click();
                    });
                    break;
                    
                case 'market':
                    tabContent.innerHTML = await renderMarketTab();
                    loadProducts();
                    break;
                    
                case 'earn':
                    tabContent.innerHTML = await renderHomeTab();
                    document.getElementById("dailyBtn")?.addEventListener('click', claimDaily);
                    document.getElementById("rewardedBtn")?.addEventListener('click', watchRewardedAd);
                    document.getElementById("withdrawBtn")?.addEventListener('click', requestWithdrawal);
                    document.getElementById("copyReferralBtn")?.addEventListener('click', () => {
                        const code = userData?.referralCode || currentUser?.uid?.substring(0, 8) || 'NONE';
                        navigator.clipboard.writeText(code);
                        showToast("📋 Code copied!", 1500);
                    });
                    document.querySelectorAll('.popular-card[data-url]').forEach(c => c.addEventListener('click', () => openUrl(c.dataset.url)));
                    break;
                    
                case 'learn':
                    tabContent.innerHTML = await renderLearnTab();
                    document.querySelectorAll('.complete-lesson').forEach(btn => {
                        const card = btn.closest('.lesson-card');
                        if (card) btn.addEventListener('click', () => {
                            const id = parseInt(card.dataset.id);
                            const reward = parseInt(card.dataset.reward);
                            const key = `lesson_${id}`;
                            if (userData?.[key]) { showToast("Already completed!", 1500); return; }
                            db.collection('users').doc(currentUser.uid).update({ [key]: true });
                            updatePoints(reward, 'Lesson completed!');
                        });
                    });
                    break;
                    
                case 'jobs':
                    tabContent.innerHTML = await renderJobsTab();
                    document.querySelectorAll('.apply-job').forEach(b => b.addEventListener('click', () => openUrl(b.dataset.url)));
                    break;
                    
                case 'profile':
                    tabContent.innerHTML = await renderProfileTab();
                    document.getElementById("logoutBtn")?.addEventListener('click', signOut);
                    break;
                    
                default:
                    tabContent.innerHTML = '<div class="loading">Loading...</div>';
            }

            // Update user email in header
            const userEmailEl = document.getElementById('userEmail');
            if (userEmailEl && currentUser) {
                userEmailEl.innerText = currentUser.email;
            }
        }

        // ============================================================
        // AUTH STATE
        // ============================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                await loadUserData();
                renderApp();
            } else {
                currentUser = null;
                userData = null;
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        // ============================================================
        // CLOSE MODALS ON CLICK OUTSIDE
        // ============================================================
        window.onclick = function(event) {
            const sellModal = document.getElementById('sellModal');
            const detailModal = document.getElementById('detailModal');
            if (event.target === sellModal) closeSellModal();
            if (event.target === detailModal) closeDetailModal();
        };

        // Make functions globally accessible
        window.spinWheel = spinWheel;
        window.closeAdManually = closeAdManually;
    </script>
</body>
</html>
