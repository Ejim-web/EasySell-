<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EasySell - Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #242424;
            --bg-input: #2a2a2a;
            --text-primary: #f0f0f0;
            --text-secondary: #aaa;
            --text-muted: #666;
            --accent: #00b16a;
            --accent-hover: #00995a;
            --accent-glow: rgba(0, 177, 106, 0.25);
            --border-color: #333;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s ease;
            --nav-height: 68px;
            --header-height: 64px;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: calc(var(--nav-height) + 24px);
            padding-top: var(--header-height);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        img {
            display: block;
            max-width: 100%;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
            color: inherit;
        }
        input,
        select,
        textarea {
            font-family: inherit;
            outline: none;
            border: none;
            color: inherit;
            background: var(--bg-input);
        }
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .hidden {
            display: none !important;
        }
        .flex {
            display: flex;
        }
        .flex-col {
            flex-direction: column;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }
        .gap-1 {
            gap: 8px;
        }
        .gap-2 {
            gap: 16px;
        }
        .gap-3 {
            gap: 24px;
        }
        .w-full {
            width: 100%;
        }
        .text-center {
            text-align: center;
        }
        .text-accent {
            color: var(--accent);
        }
        .text-muted {
            color: var(--text-muted);
        }
        .text-sm {
            font-size: 0.85rem;
        }
        .text-xs {
            font-size: 0.75rem;
        }
        .mt-1 {
            margin-top: 8px;
        }
        .mt-2 {
            margin-top: 16px;
        }
        .mt-3 {
            margin-top: 24px;
        }
        .mb-1 {
            margin-bottom: 8px;
        }
        .mb-2 {
            margin-bottom: 16px;
        }
        .relative {
            position: relative;
        }
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--bg-input);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 24px auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13, 13, 13, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border-width: 4px;
        }

        .toast-container {
            position: fixed;
            top: 80px;
            right: 16px;
            left: 16px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 400px;
            margin: 0 auto;
        }
        .toast {
            pointer-events: auto;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
            box-shadow: var(--shadow);
            animation: slideDown 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast.error {
            border-left-color: #e74c3c;
        }
        .toast.success {
            border-left-color: var(--accent);
        }
        .toast i {
            font-size: 1.2rem;
            color: var(--accent);
        }
        .toast.error i {
            color: #e74c3c;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            gap: 12px;
            backdrop-filter: blur(12px);
            background: rgba(26, 26, 26, 0.92);
        }
        .header .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            color: var(--text-primary);
        }
        .header .logo i {
            color: var(--accent);
            font-size: 1.5rem;
        }
        .header .logo span {
            color: var(--accent);
        }
        .header-search {
            flex: 1;
            min-width: 0;
            background: var(--bg-input);
            border-radius: 24px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
            transition: border var(--transition);
        }
        .header-search:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .header-search i {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .header-search input {
            flex: 1;
            background: transparent;
            padding: 10px 0;
            font-size: 0.9rem;
            min-width: 0;
            color: var(--text-primary);
        }
        .header-search input::placeholder {
            color: var(--text-muted);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: background var(--transition), color var(--transition);
            background: transparent;
        }
        .header-actions button:hover,
        .header-actions button:active {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .header-actions .avatar-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid transparent;
            transition: border var(--transition);
        }
        .header-actions .avatar-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-actions .avatar-btn:hover {
            border-color: var(--accent);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
            padding: 0 8px;
            backdrop-filter: blur(12px);
            background: rgba(26, 26, 26, 0.94);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 0.6rem;
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            transition: color var(--transition);
            position: relative;
            background: transparent;
            border: none;
        }
        .bottom-nav .nav-item i {
            font-size: 1.4rem;
            transition: transform var(--transition);
        }
        .bottom-nav .nav-item.active {
            color: var(--accent);
        }
        .bottom-nav .nav-item.active i {
            transform: scale(1.05);
        }
        .bottom-nav .nav-item .badge {
            position: absolute;
            top: 0;
            right: 4px;
            background: #e74c3c;
            color: #fff;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        .bottom-nav .sell-btn {
            background: var(--accent);
            color: #fff;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-top: -18px;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: transform var(--transition), box-shadow var(--transition);
            z-index: 10;
            position: relative;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
        }
        .bottom-nav .sell-btn:active {
            transform: scale(0.92);
        }

        .page {
            display: none;
            padding: 16px;
            padding-bottom: 20px;
            animation: fadeUp 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar {
            display: none;
        }
        .category-chip {
            flex-shrink: 0;
            scroll-snap-align: start;
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
            transition: all var(--transition);
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .category-chip i {
            font-size: 1rem;
            color: var(--accent);
        }
        .category-chip.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .category-chip.active i {
            color: #fff;
        }
        .category-chip:active {
            transform: scale(0.96);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 8px;
        }
        @media (min-width: 500px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 768px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform var(--transition), box-shadow var(--transition);
            cursor: pointer;
            position: relative;
        }
        .product-card:active {
            transform: scale(0.97);
        }
        .product-card .img-wrap {
            position: relative;
            padding-top: 100%;
            background: var(--bg-input);
            overflow: hidden;
        }
        .product-card .img-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            background: var(--bg-input);
        }
        .product-card:hover .img-wrap img {
            transform: scale(1.03);
        }
        .product-card .img-wrap .img-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 2rem;
            background: var(--bg-input);
        }
        .product-card .card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .product-card .card-wishlist {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 0.9rem;
            transition: all var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .product-card .card-wishlist.liked {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.2);
        }
        .product-card .card-body {
            padding: 10px 12px 12px;
        }
        .product-card .card-body .title {
            font-weight: 600;
            font-size: 0.85rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-card .card-body .price {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--accent);
            margin-top: 4px;
        }
        .product-card .card-body .meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .product-card .card-body .meta i {
            margin-right: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--border-color);
            margin-bottom: 16px;
        }
        .empty-state h3 {
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-overlay .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius) var(--radius) 0 0;
            max-width: 560px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            padding: 20px 20px 28px;
            transform: translateY(30px);
            transition: transform 0.3s ease;
            border-top: 1px solid var(--border-color);
        }
        .modal-overlay.open .modal {
            transform: translateY(0);
        }
        .modal .modal-handle {
            width: 48px;
            height: 4px;
            background: var(--border-color);
            border-radius: 4px;
            margin: 0 auto 16px;
        }
        .modal .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .modal .modal-close {
            position: sticky;
            top: 0;
            float: right;
            background: var(--bg-input);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            transition: background var(--transition);
            z-index: 2;
        }
        .modal .modal-close:hover {
            background: var(--border-color);
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            transition: border var(--transition), box-shadow var(--transition);
            color: var(--text-primary);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            transition: border var(--transition), background var(--transition);
            cursor: pointer;
            background: var(--bg-input);
        }
        .form-group .file-upload-area:hover {
            border-color: var(--accent);
            background: var(--bg-card);
        }
        .form-group .file-upload-area i {
            font-size: 2rem;
            margin-bottom: 6px;
            display: block;
            color: var(--accent);
        }
        .form-group .file-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .form-group .file-preview-grid .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }
        .form-group .file-preview-grid .preview-item img,
        .form-group .file-preview-grid .preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .form-group .file-preview-grid .preview-item .remove-file {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            backdrop-filter: blur(4px);
        }
        .btn {
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.95rem;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            background: var(--bg-input);
            color: var(--text-primary);
            width: 100%;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
        }
        .btn-outline:hover {
            border-color: var(--accent);
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.8rem;
            width: auto;
        }
        .btn-block {
            width: 100%;
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .searchable-dropdown {
            position: relative;
            width: 100%;
        }
        .searchable-dropdown input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            transition: border var(--transition), box-shadow var(--transition);
            color: var(--text-primary);
        }
        .searchable-dropdown input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .searchable-dropdown input::placeholder {
            color: var(--text-muted);
        }
        .searchable-dropdown .dropdown-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            z-index: 300;
            display: none;
            box-shadow: var(--shadow);
        }
        .searchable-dropdown .dropdown-list.open {
            display: block;
        }
        .searchable-dropdown .dropdown-list .option {
            padding: 10px 14px;
            cursor: pointer;
            transition: background var(--transition);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .searchable-dropdown .dropdown-list .option:hover,
        .searchable-dropdown .dropdown-list .option.active {
            background: var(--accent);
            color: #fff;
        }

        // ================================================================
        //  SEARCHABLE DROPDOWN HELPER
        // ================================================================
        function createSearchableDropdown(inputEl, listEl, hiddenEl, options, displayKey, valueKey, defaultVal) {
            let selectedValue = defaultVal;
            let selectedDisplay = options.find(o => o[valueKey] === defaultVal)?.[displayKey] || '';

            function renderOptions(filter = '') {
                const filtered = options.filter(o =>
                    o[displayKey].toLowerCase().includes(filter.toLowerCase())
                );
                listEl.innerHTML = filtered.map(o =>
                    `<div class="option" data-value="${o[valueKey]}">${o[displayKey]}</div>`
                ).join('');
                listEl.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', () => {
                        selectedValue = opt.dataset.value;
                        selectedDisplay = opt.textContent;
                        inputEl.value = selectedDisplay;
                        hiddenEl.value = selectedValue;
                        listEl.classList.remove('open');
                        inputEl.blur();
                        const evt = new Event('change');
                        hiddenEl.dispatchEvent(evt);
                    });
                });
            }

            const defaultOption = options.find(o => o[valueKey] === defaultVal);
            if (defaultOption) {
                inputEl.value = defaultOption[displayKey];
                hiddenEl.value = defaultVal;
                selectedDisplay = defaultOption[displayKey];
            }

            inputEl.addEventListener('focus', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.dropdown-list.open').forEach(el => {
                    if (el !== listEl) el.classList.remove('open');
                });
                renderOptions('');
                listEl.classList.add('open');
                inputEl.select();
            });

            inputEl.addEventListener('input', (e) => {
                const val = e.target.value;
                renderOptions(val);
                listEl.classList.add('open');
            });

            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    listEl.classList.remove('open');
                    inputEl.blur();
                    if (inputEl.value === '') {
                        inputEl.value = selectedDisplay || defaultOption?.[displayKey] || '';
                    }
                }
                if (e.key === 'Enter') {
                    const firstOption = listEl.querySelector('.option');
                    if (firstOption) {
                        firstOption.click();
                    }
                }
            });

            document.addEventListener('click', (e) => {
                if (!inputEl.contains(e.target) && !listEl.contains(e.target)) {
                    listEl.classList.remove('open');
                    if (inputEl.value === '') {
                        inputEl.value = selectedDisplay || defaultOption?.[displayKey] || '';
                    }
                }
            });

            return {
                getValue: () => hiddenEl.value,
                getDisplay: () => inputEl.value,
                setValue: (val) => {
                    const opt = options.find(o => o[valueKey] === val);
                    if (opt) {
                        selectedValue = val;
                        selectedDisplay = opt[displayKey];
                        inputEl.value = selectedDisplay;
                        hiddenEl.value = val;
                    }
                }
            };
        }

        // ================================================================

        // ================================================================
        function showToast(message, type = 'success') {
            const container = dom.toast;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' :
                'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

                const initial = name.charAt(0).toUpperCase();

                avatarBtn.style.background = 'var(--accent)';

                avatarBtn.style.color = '';
                avatarBtn.style.fontWeight = '';

            if (dom.authModal.classList.contains('open')) {
                dom.authModal.classList.remove('open');

        // ================================================================
        //  PRODUCT CRUD
        // ================================================================
        function productToFirestore(data) {
            return {
                title: data.title.trim(),
                price: parseFloat(data.price) || 0,
                currency: data.currency || '$',
                category: data.category || 'other',
                condition: data.condition || 'used',
                location: data.location || 'US',
                status: data.status || 'available',
                description: data.description || '',
                imageUrls: data.imageUrls || [],
                videoUrl: data.videoUrl || '',
                sellerId: data.sellerId || state.currentUser?.uid || 'anonymous',
                sellerName: data.sellerName || state.currentUser?.displayName || 'Anonymous',
                sellerEmail: data.sellerEmail || state.currentUser?.email || '',
                createdAt: data.createdAt || firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                wishlistCount: data.wishlistCount || 0,
            };
        }

        async function saveProduct(data, editId = null) {
            if (!state.currentUser) {
                showToast('Please sign in first', 'error');
                dom.authModal.classList.add('open');
                return null;
            }
            try {
                showLoader(true);
                const productData = productToFirestore(data);
                productData.sellerId = state.currentUser.uid;
                productData.sellerName = state.currentUser.displayName || state.currentUser.email || 'User';
                productData.sellerEmail = state.currentUser.email;

                let docRef;
                if (editId) {
                    await db.collection('products').doc(editId).update(productData);
                    docRef = { id: editId };
                    showToast('Ad updated!');
                } else {
                    docRef = await db.collection('products').add(productData);
                    showToast('Ad posted!');
                }
                await loadProducts(true);
                closeSellModal();
                return docRef.id;
            } catch (err) {
                showToast(err.message, 'error');

            try {
                showLoader(true);
                await db.collection('products').doc(id).delete();
                showToast('Ad deleted');
                await loadProducts(true);
                closeSellModal();

        // ================================================================
        //  CLOUDINARY UPLOAD FUNCTION
        // ================================================================
        async function uploadToCloudinary(file, isVideo = false) {
            const url = isVideo ? CLOUDINARY.videoUrl : CLOUDINARY.url;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY.uploadPreset);
            formData.append('folder', 'easysell_products');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Upload failed');
                }

                const data = await response.json();
                return data.secure_url;
            } catch (err) {
                console.error('Cloudinary upload error:', err);
                throw new Error(`Upload failed: ${err.message}`);
            }
        }

        // ================================================================
        //  LOAD PRODUCTS
        // ================================================================
        let loadingProducts = false;
        let allProductsLoaded = false;

        async function loadProducts(reset = true) {
            if (loadingProducts) return;
            if (reset) {
                state.lastDoc = null;
                state.products = [];
                allProductsLoaded = false;
                dom.grid.innerHTML = '';
            }
            if (allProductsLoaded) return;

            if (!state.currentUser) {
                dom.grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fas fa-store-alt"></i>
                        <h3>Sign in to see listings</h3>
                        <p class="text-muted">Create an account or log in to browse and sell items.</p>
                        <button class="btn btn-primary mt-1" onclick="dom.authModal.classList.add('open')" style="max-width:200px;margin:12px auto 0;">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </div>
                `;
                return;
            }

            loadingProducts = true;
            dom.scrollTrigger.textContent = 'Loading...';

            try {
                let query = db.collection('products')
                    .orderBy('createdAt', 'desc')
                    .limit(state.pageSize);

                if (state.lastDoc && !reset) {
                    query = query.startAfter(state.lastDoc);
                }

                const snap = await query.get();
                const docs = [];
                snap.forEach(doc => {
                    docs.push({ id: doc.id, ...doc.data() });
                });

                if (docs.length < state.pageSize) allProductsLoaded = true;
                if (docs.length > 0) {
                    state.lastDoc = snap.docs[snap.docs.length - 1];
                }

                let filtered = docs;
                filtered = filtered.filter(p => p.status === 'available');

                const search = state.searchQuery.toLowerCase().trim();
                if (search) {
                    filtered = filtered.filter(p =>
                        (p.title || '').toLowerCase().includes(search) ||
                        (p.description || '').toLowerCase().includes(search) ||
                        (p.category || '').toLowerCase().includes(search)
                    );
                }
                if (state.currentCategory !== 'all') {
                    filtered = filtered.filter(p => p.category === state.currentCategory);
                }
                if (state.filterCondition !== 'all') {
                    filtered = filtered.filter(p => p.condition === state.filterCondition);
                }
                if (state.filterLocation !== 'all') {
                    filtered = filtered.filter(p => p.location === state.filterLocation);
                }

                if (state.sortPrice === 'low') {
                    filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
                } else if (state.sortPrice === 'high') {
                    filtered.sort((a, b) => (b.price || 0) - (a.price || 0));
                }

                if (reset) {
                    state.products = filtered;
                    renderProducts(filtered);
                } else {
                    state.products = [...state.products, ...filtered];
                    renderProducts(state.products);
                }

                dom.scrollTrigger.textContent = allProductsLoaded ? '— All loaded —' : 'Load more...';
            } catch (err) {
                console.error('Load products error:', err);
                dom.scrollTrigger.textContent = '— Error loading —';
                if (reset) {
                    dom.grid.innerHTML =
                        `<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-exclamation-triangle"></i><h3>Could not load products</h3><p class="text-muted">${err.message}</p></div>`;
                }
            } finally {
                loadingProducts = false;
            }
        }

            const grid = dom.grid;

            }

                const imgUrl = p.imageUrls && p.imageUrls.length > 0 ? p.imageUrls[0] : '';
                const isWishlisted = state.wishlist.includes(p.id);
                const priceStr = `${p.currency || '$'}${(p.price || 0).toFixed(2)}`;
                html += `
                    <div class="product-card" data-id="${p.id}">
                        <div class="img-wrap">
                            ${imgUrl ? `<img src="${imgUrl}" alt="${p.title || 'Item'}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` : ''}

                            <span class="card-badge">${p.condition || 'Used'}</span>
                            <button class="card-wishlist ${isWishlisted ? 'liked' : ''}" data-id="${p.id}" onclick="toggleWishlist('${p.id}', event)">
                                <i class="fas fa-heart"></i>
                            </button>

        // ================================================================
        //  WISHLIST
        // ================================================================
        async function loadUserWishlist() {
            if (!state.currentUser) return;
            try {
                const doc = await db.collection('users').doc(state.currentUser.uid).get();
                if (doc.exists) {
                    state.wishlist = doc.data().wishlist || [];
                } else {
                    state.wishlist = [];
                }
                renderWishlist();
                updateWishlistBadge();
            } catch (err) {
                console.warn('Wishlist load error:', err);
                state.wishlist = [];

        }

        async function toggleWishlist(productId, event) {
            if (event) event.stopPropagation();
            if (!state.currentUser) {
                showToast('Sign in to save items', 'error');
                dom.authModal.classList.add('open');
                return;
            }
            const idx = state.wishlist.indexOf(productId);
            if (idx > -1) {
                state.wishlist.splice(idx, 1);
            } else {
                state.wishlist.push(productId);
            }
            try {
                await db.collection('users').doc(state.currentUser.uid).set({
                    wishlist: state.wishlist
                }, { merge: true });
                renderWishlist();
                updateWishlistBadge();
                renderProducts(state.products);
                showToast(idx > -1 ? 'Removed from wishlist' : 'Added to wishlist');
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function renderWishlist() {
            const grid = dom.wishlistGrid;
            const empty = dom.wishlistEmpty;
            const items = state.products.filter(p => state.wishlist.includes(p.id));
            if (items.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            let html = '';
            items.forEach(p => {
                const imgUrl = p.imageUrls && p.imageUrls.length > 0 ? p.imageUrls[0] : '';
                const priceStr = `${p.currency || '$'}${(p.price || 0).toFixed(2)}`;
                html += `
                    <div class="product-card" data-id="${p.id}" onclick="openDetail('${p.id}')">
                        <div class="img-wrap">
                            ${imgUrl ? `<img src="${imgUrl}" alt="${p.title || 'Item'}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` : ''}
                            <div class="img-placeholder" style="${imgUrl ? 'display:none;' : ''}"><i class="fas fa-image"></i></div>
                            <span class="card-badge">${p.condition || 'Used'}</span>
                            <button class="card-wishlist liked" data-id="${p.id}" onclick="toggleWishlist('${p.id}', event)">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="title">${p.title || 'Untitled'}</div>
                            <div class="price">${priceStr}</div>

                    <div class="detail-carousel" id="detailCarousel">

        let carouselIndex = 0;

        function slideCarousel(direction) {
            const track = document.getElementById('carouselTrack');
            const dots = document.querySelectorAll('#carouselDots span');
            if (!track || !dots.length) return;
            const total = dots.length;
            carouselIndex = (carouselIndex + direction + total) % total;
            track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            dots.forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
        }

        dom.detailModalClose.addEventListener('click', () => {
            dom.detailModal.classList.remove('open');

        dom.detailModal.addEventListener('click', (e) => {

        // ================================================================
        //  SHARE
        // ================================================================
        function shareProduct(productId) {
            const p = state.products.find(x => x.id === productId);
            if (!p) return;
            const text = `Check out ${p.title || 'this item'} on EasySell! ${p.currency || '$'}${(p.price||0).toFixed(2)}`;
            if (navigator.share) {
                navigator.share({ title: p.title, text, url: window.location.href }).catch(() => {});
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard!');
                }).catch(() => {
                    showToast('Share: ' + text);
                });
            }
        }

        //  CHAT
        // ================================================================
        function openChatWithSeller(sellerId, productId) {
            navigateTo('chat');
            showToast('Chat opened with seller');
            const p = state.products.find(x => x.id === productId);
            const msg = `Hi! I'm interested in ${p ? p.title : 'your item'}.`;
            dom.chatInput.value = msg;
            sendChatMessage();
        }

        dom.chatSendBtn.addEventListener('click', sendChatMessage);
        dom.chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        function sendChatMessage() {
            const input = dom.chatInput;
            const text = input.value.trim();
            if (!text) return;
            if (!state.currentUser) {
                showToast('Sign in to chat', 'error');
                dom.authModal.classList.add('open');
                return;
            }
            const container = dom.chatMessages;
            const div = document.createElement('div');
            div.className = 'msg sent';
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            input.value = '';
            setTimeout(() => {
                const reply = document.createElement('div');
                reply.className = 'msg received';
                reply.textContent = 'Thanks for your message! I\'ll get back to you soon.';
                container.appendChild(reply);
                container.scrollTop = container.scrollHeight;
            }, 1200);
        }

        // Image upload
        dom.imageUploadArea.addEventListener('click', () => dom.imageInput.click());
        dom.imageInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            const remaining = 10 - state.uploadedImages.length;
            const toAdd = files.slice(0, remaining);
            toAdd.forEach(file => {
                state.uploadedImages.push(file);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    addPreviewImage(ev.target.result, state.uploadedImages.length - 1, file);
                };
                reader.readAsDataURL(file);
            });
            dom.imageInput.value = '';
            if (state.uploadedImages.length >= 10) {
                showToast('Maximum 10 images reached', 'error');
            }
        });

        function addPreviewImage(src, index, file = null) {
            const grid = dom.imagePreviewGrid;
            const item = document.createElement('div');
            item.className = 'preview-item';
            item.dataset.index = index;
            const isFile = file instanceof File;
            item.innerHTML = `
                ${isFile ? `<img src="${src}" alt="Preview" />` : `<img src="${src}" alt="Preview" />`}
                <button class="remove-file" onclick="removeImage(${index})"><i class="fas fa-times"></i></button>
            `;
            grid.appendChild(item);
        }

        function removeImage(index) {
            state.uploadedImages.splice(index, 1);
            dom.imagePreviewGrid.innerHTML = '';
            state.uploadedImages.forEach((file, i) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    addPreviewImage(ev.target.result, i, file);
                };
                reader.readAsDataURL(file);
            });
        }

        function addPreviewVideo(src) {
            const grid = dom.videoPreviewGrid;
            grid.innerHTML = '';
            const item = document.createElement('div');
            item.className = 'preview-item';
            item.innerHTML = `
                <video src="${src}" muted playsinline></video>
                <button class="remove-file" onclick="removeVideo()"><i class="fas fa-times"></i></button>
            `;
            grid.appendChild(item);
        }

        function removeVideo() {
            state.uploadedVideo = null;
            dom.videoPreviewGrid.innerHTML = '';
            dom.videoInput.value = '';
        }

        dom.videoUploadArea.addEventListener('click', () => dom.videoInput.click());
        dom.videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (state.uploadedVideo) {
                showToast('Only one video allowed', 'error');
                return;
            }
            state.uploadedVideo = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                addPreviewVideo(ev.target.result);
            };
            reader.readAsDataURL(file);
            dom.videoInput.value = '';
        });

        // ================================================================
        //  SELL FORM SUBMIT — WITH CLOUDINARY
        // ================================================================
        dom.sellForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = dom.sellTitle.value.trim();
            const price = parseFloat(dom.sellPrice.value);

            if (!title || !price) {
                showToast('Title and price are required', 'error');
                return;
            }

            if (!state.currentUser) {
                showToast('Please sign in to post', 'error');
                dom.authModal.classList.add('open');
                return;
            }

            const currency = dom.sellCurrency.value || '$';
            const location = dom.sellLocation.value || 'US';

            // Disable submit button to prevent double submission
            dom.sellSubmitBtn.disabled = true;
            dom.sellSubmitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            try {
                const editId = dom.sellEditId.value;
                let imageUrls = [];
                let videoUrl = '';

                // Keep existing images if editing
                if (editId) {
                    const existing = state.products.find(p => p.id === editId);
                    if (existing) {
                        imageUrls = existing.imageUrls || [];
                        videoUrl = existing.videoUrl || '';
                    }
                }

                // Upload images to Cloudinary
                if (state.uploadedImages.length > 0) {
                    showToast(`Uploading ${state.uploadedImages.length} images...`, 'success');
                    const uploadPromises = state.uploadedImages.map(async (file) => {
                        return await uploadToCloudinary(file, false);
                    });
                    const newUrls = await Promise.all(uploadPromises);
                    imageUrls = newUrls;
                }

                // Upload video to Cloudinary
                if (state.uploadedVideo) {
                    showToast('Uploading video...', 'success');
                    videoUrl = await uploadToCloudinary(state.uploadedVideo, true);
                }

                const data = {
                    title,
                    price,
                    currency: currency,
                    category: dom.sellCategory.value,
                    condition: dom.sellCondition.value,
                    location: location,
                    status: dom.sellStatus.value,
                    description: dom.sellDescription.value,
                    imageUrls,
                    videoUrl,
                };

                if (editId) {
                    await saveProduct(data, editId);
                } else {
                    await saveProduct(data);
                }

                closeSellModal();
                await loadProducts(true);
                showToast('Ad posted successfully! 🎉', 'success');

            } catch (err) {
                console.error('Error details:', err);
                showToast('Error: ' + err.message, 'error');
                dom.sellSubmitBtn.disabled = false;
                dom.sellSubmitBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Post Ad';
            }
        });

        dom.sellDeleteBtn.addEventListener('click', () => {
            const id = dom.sellEditId.value;
            if (id) deleteProduct(id);
        });

        function editProduct(productId) {
            const p = state.products.find(x => x.id === productId);
            if (!p) return;
            dom.detailModal.classList.remove('open');
            openSellModal({ ...p, id: productId });
        }

        // ================================================================
        //  PROFILE
        // ================================================================
        function renderProfile() {
            const user = state.currentUser;
            const container = dom.profileContent;
            if (!user) {
                container.innerHTML = `
                    <div class="profile-header">
                        <div class="avatar"><i class="fas fa-user"></i></div>
                        <div class="info">
                            <h2>Guest</h2>
                            <p>Sign in to access your profile</p>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="dom.authModal.classList.add('open')">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                `;
                return;
            }
            const name = user.displayName || user.email || 'User';
            const email = user.email || '';
            const initial = name.charAt(0).toUpperCase();
            const productCount = state.products.filter(p => p.sellerId === user.uid).length;

            container.innerHTML = `
                <div class="profile-header">
                    <div class="avatar">${initial}</div>
                    <div class="info">
                        <h2>${name}</h2>
                        <p>${email}</p>
                        <p class="text-sm text-muted"><i class="fas fa-store-alt"></i> ${productCount} listings</p>
                    </div>
                </div>
                <div class="profile-menu">
                    <div class="menu-item" onclick="navigateTo('home')">
                        <i class="fas fa-store-alt"></i> My Listings
                        <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="menu-item" onclick="navigateTo('wishlist')">
                        <i class="fas fa-heart"></i> Wishlist
                        <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="menu-item" onclick="navigateTo('chat')">
                        <i class="fas fa-comment-dots"></i> Messages
                        <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="menu-item" style="cursor:pointer;" onclick="document.dispatchEvent(new CustomEvent('toggleTheme'))">
                        <i class="fas fa-palette"></i> Theme
                        <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="menu-item danger" onclick="logoutUser()">
                        <i class="fas fa-sign-out-alt"></i> Sign Out
                        <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                    </div>
                </div>
            `;
        }

        document.addEventListener('toggleTheme', () => dom.themeToggle.click());

        // ================================================================
        //  SEARCH & FILTERS
        // ================================================================
        dom.search.addEventListener('input', debounce((e) => {
            state.searchQuery = e.target.value;
            loadProducts(true);
        }, 400));

        dom.filterPrice.addEventListener('change', (e) => {
            state.sortPrice = e.target.value;
            loadProducts(true);
        });
        dom.filterCondition.addEventListener('change', (e) => {
            state.filterCondition = e.target.value;
            loadProducts(true);
        });
        dom.filterLocation.addEventListener('change', (e) => {
            state.filterLocation = e.target.value;
            loadProducts(true);
        });

        dom.categoryScroll.addEventListener('click', (e) => {
            const chip = e.target.closest('.category-chip');
            if (!chip) return;
            dom.categoryScroll.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.currentCategory = chip.dataset.category;
            loadProducts(true);
        });

        // ================================================================
        //  INFINITE SCROLL
        // ================================================================
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !loadingProducts && !allProductsLoaded) {
                    loadProducts(false);
                }
            });
        }, { rootMargin: '100px' });

        observer.observe(dom.scrollTrigger);

        // ================================================================
        //  PULL TO REFRESH
        // ================================================================
        let touchStartY = 0;
        let touchMoved = false;

        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            touchMoved = false;
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            const scrollY = window.scrollY;
            if (scrollY === 0 && e.touches[0].clientY > touchStartY + 60) {
                touchMoved = true;
                dom.pullIndicator.classList.add('active');
            }
        }, { passive: true });

        document.addEventListener('touchend', () => {
            if (touchMoved) {
                dom.pullIndicator.classList.remove('active');
                loadProducts(true);
                showToast('Refreshed!');
            }
        }, { passive: true });

        // ================================================================
        //  UTILITY
        // ================================================================
        function debounce(fn, delay) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }

        function timeAgo(timestamp) {
            if (!timestamp) return 'recent';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
            return date.toLocaleDateString();
        }

        // ================================================================
        //  INIT
        // ================================================================
        async function init() {
            showLoader(true);

            // Initialize dropdowns
            initDropdowns();

            try {
                await loadProducts(true);
                if (state.currentUser) {
                    await loadUserWishlist();
                }
                renderProfile();
            } catch (err) {
                console.warn('Init error:', err);
            } finally {
                showLoader(false);
            }

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    dom.search.focus();
                }
            });

            console.log('🚀 EasySell loaded successfully!');
            console.log('📸 Cloudinary configured with cloud:', CLOUDINARY.cloudName);
            console.log('💡 Click the + button to sell!');
        }

        auth.onAuthStateChanged(() => {
            loadProducts(true);
            renderProfile();
        });

        // Expose functions to window
        window.toggleWishlist = toggleWishlist;
        window.openDetail = openDetail;
        window.deleteProduct = deleteProduct;
        window.editProduct = editProduct;
        window.viewSellerProfile = viewSellerProfile;
        window.shareProduct = shareProduct;
        window.openChatWithSeller = openChatWithSeller;
        window.slideCarousel = slideCarousel;
        window.removeImage = removeImage;
        window.removeVideo = removeVideo;
        window.logoutUser = logoutUser;
        window.navigateTo = navigateTo;
        window.dom = dom;
        window.openSellModal = openSellModal;

        init();
    </script>

</body>
</html>
