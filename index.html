<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasySell - Global Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        :root { --primary: #00b16a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: system-ui, sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            min-height: 100vh;
        }

        header { 
            background: #111; 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); }

        .search-bar { 
            background: #1f1f1f; 
            border-radius: 12px; 
            padding: 12px 16px; 
            margin: 12px 16px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .search-bar input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            outline: none; 
        }

        .categories { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); 
            gap: 12px; 
            padding: 0 16px 20px; 
        }
        .cat-item { 
            text-align: center; 
            background: #1f1f1f; 
            border-radius: 12px; 
            padding: 12px 8px; 
            cursor: pointer; 
        }
        .cat-icon { font-size: 28px; margin-bottom: 8px; }

        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 16px; 
            padding: 0 16px 80px; 
        }
        .product-card { 
            background: #1f1f1f; 
            border-radius: 12px; 
            overflow: hidden; 
        }
        .product-card img { width: 100%; height: 160px; object-fit: cover; }
        .product-info { padding: 12px; }
        .product-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .product-price { color: var(--primary); font-size: 18px; font-weight: 700; }

        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #111; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            border-top: 1px solid #222; 
        }
        .nav-item { text-align: center; color: #aaa; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: flex-end; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: #1a1a1a; width: 100%; max-height: 92vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }

        .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 30px; font-size: 17px; font-weight: 700; margin-top: 20px; }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 14px 24px; border-radius: 9999px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <header>
        <div class="logo">EasySell</div>
        <div style="background:#00b16a;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;">🌍</div>
    </header>

    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search worldwide..." oninput="applyFilters()">
    </div>

    <div class="categories" id="categoriesBar"></div>

    <div class="products-grid" id="productsContainer"></div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fas fa-home"></i><div>Home</div></div>
        <div class="nav-item" onclick="openSellModal()"><i class="fas fa-plus-circle" style="font-size:28px;"></i></div>
        <div class="nav-item" onclick="switchTab('profile')"><i class="fas fa-user"></i><div>Profile</div></div>
    </div>

    <!-- Sell Modal -->
    <div id="sellModal" class="modal">
        <div class="modal-content">
            <h2>Post New Ad (Global)</h2>
            <form onsubmit="submitAd(event)">
                <input type="text" id="adTitle" placeholder="Title" required style="width:100%;padding:14px;margin:10px 0;background:#222;border:none;border-radius:8px;color:white;">
                <select id="adCategory" style="width:100%;padding:14px;margin:10px 0;background:#222;border:none;border-radius:8px;color:white;">
                    <option value="">Category</option>
                    <option value="Cars">Cars</option>
                    <option value="Phones">Phones</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Property">Property</option>
                </select>
                <button type="submit" class="submit-btn">Post Globally</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const categories = [
            {name:"Cars", icon:"🚗"},
            {name:"Phones", icon:"📱"},
            {name:"Electronics", icon:"💻"},
            {name:"Fashion", icon:"👗"},
            {name:"Property", icon:"🏠"}
        ];

        function renderCategories() {
            const container = document.getElementById('categoriesBar');
            container.innerHTML = categories.map(c => `
                <div class="cat-item" onclick="filterByCategory('${c.name}')">
                    <div class="cat-icon">${c.icon}</div>
                    <div style="font-size:13px;">${c.name}</div>
                </div>
            `).join('');
        }

        function loadProducts() {
            const products = [
                {id:1, title:"Toyota Camry", price:12800000, image:"https://picsum.photos/id/1015/300/200"},
                {id:2, title:"iPhone 14", price:450000, image:"https://picsum.photos/id/20/300/200"},
                {id:3, title:"MacBook Pro", price:1200000, image:"https://picsum.photos/id/201/300/200"}
            ];
            renderProducts(products);
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="viewDetail(${p.id})">
                    <img src="${p.image}" alt="">
                    <div class="product-info">
                        <div class="product-name">${p.title}</div>
                        <div class="product-price">$${p.price.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
        }

        window.openSellModal = function() {
            document.getElementById('sellModal').classList.add('show');
        };

        window.submitAd = function(e) {
            e.preventDefault();
            showToast("✅ Ad posted globally!");
            document.getElementById('sellModal').classList.remove('show');
        };

        window.viewDetail = function(id) {
            showToast("Opening product details...");
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        // Init
        renderCategories();
        loadProducts();
    </script>
</body>
</html>
