<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>EasySell · Buy & Sell</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f5f5f5; min-height: 100vh; padding-bottom: 70px; }

        .login-container {
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        .login-card {
            background: white; border-radius: 32px; padding: 40px 28px; max-width: 400px; width: 100%;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .login-logo { width: 80px; height: 80px; background: linear-gradient(135deg, #059669, #047857); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .login-logo span { font-size: 45px; }
        .login-card h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a2e; }
        .login-card p { color: #6b7280; margin-bottom: 25px; font-size: 14px; }
        .login-input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 30px; margin-bottom: 12px; font-size: 14px; background: #f8f9fa; outline: none; }
        .login-input:focus { border-color: #059669; }
        .login-btn { width: 100%; background: linear-gradient(135deg, #059669, #047857); color: white; border: none; padding: 14px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .switch-btn { background: none; border: none; color: #059669; margin-top: 15px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .error-msg { color: #dc2626; font-size: 13px; margin-bottom: 10px; min-height: 20px; }

        .main-app { display: none; }
        .top-header { background: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: 800; color: #059669; }
        .logo span { color: #1a1a2e; }
        .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: #059669; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; cursor: pointer; }

        .search-bar { display: flex; background: #f1f3f5; border-radius: 30px; padding: 4px 16px; align-items: center; margin-bottom: 8px; }
        .search-bar input { flex: 1; border: none; background: transparent; padding: 10px 0; outline: none; }

        .sell-promo { background: linear-gradient(135deg, #059669, #047857); border-radius: 16px; padding: 20px; color: white; text-align: center; margin-bottom: 16px; cursor: pointer; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 16px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: flex-end; z-index: 9999; }
        .modal.show { display: flex !important; }
        .modal-content { background: white; border-radius: 24px 24px 0 0; padding: 24px; width: 100%; max-height: 90vh; overflow-y: auto; }

        .submit-btn { width: 100%; background: linear-gradient(135deg, #059669, #047857); color: white; border: none; padding: 14px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; }

        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 30px; display: none; z-index: 9999; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-logo"><span>🛍️</span></div>
            <h1 id="formTitle">Welcome to EasySell</h1>
            <p id="formSubtitle">Nigeria's trusted marketplace</p>
            <div id="errorMsg" class="error-msg"></div>
            <input type="email" id="loginEmail" class="login-input" placeholder="Email address" />
            <input type="password" id="loginPassword" class="login-input" placeholder="Password" />
            <button class="login-btn" onclick="doLogin()" id="actionBtn">Login</button>
            <button class="switch-btn" onclick="toggleForm()" id="switchBtn">Don't have an account? Sign Up</button>
            <div style="margin-top: 15px; border-top: 1px solid #e5e7eb; padding-top: 15px;">
                <button class="login-btn" onclick="continueAsGuest()" style="background: #6b7280;">Continue as Guest</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="main-app">
        <div class="top-header">
            <div class="logo">Easy<span>Sell</span></div>
            <div class="user-avatar" onclick="switchTab('profile')" id="userAvatar">U</div>
        </div>

        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products..." oninput="applyFilters()" />
            </div>
        </div>

        <div class="main-content">
            <div id="homeContent">
                <div class="sell-promo" onclick="openSellModal()">
                    <h3>Sell Your Item</h3>
                    <p>Reach thousands of buyers</p>
                    <button class="submit-btn">Post Ad Now</button>
                </div>
                <div id="productsContainer">
                    <p style="text-align:center;padding:60px 20px;color:#666;">No products yet.<br>Be the first to post!</p>
                </div>
            </div>
        </div>

        <!-- SELL MODAL -->
        <div id="sellModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="sellModalTitle"><i class="fas fa-box-open" style="color:#059669;"></i> <strong>POST NEW AD</strong></h2>
                    <button onclick="closeSellModal()" style="font-size:30px;background:none;border:none;">×</button>
                </div>
                <form id="sellForm" onsubmit="submitAd(event)">
                    <input type="text" id="adTitle" placeholder="Title" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;">
                    <select id="adCategory" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;">
                        <option value="">Select Category</option>
                        <option value="Cars">Cars</option>
                        <option value="Mobile Phones">Mobile Phones</option>
                        <option value="Electronics">Electronics</option>
                    </select>
                    <button type="submit" class="submit-btn">Post Ad</button>
                </form>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAWF9XukiN4nuA7LlbsaU2qiZgzTGM3FE",
            authDomain: "easysell-75318.firebaseapp.com",
            projectId: "easysell-75318",
            storageBucket: "easysell-75318.firebasestorage.app",
            messagingSenderId: "81916821182",
            appId: "1:81916821182:web:46064186708cec62eba8ef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let currentUser = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        window.openSellModal = function() {
            console.log("Modal should open now");
            document.getElementById('sellModal').classList.add('show');
        };

        window.closeSellModal = function() {
            document.getElementById('sellModal').classList.remove('show');
        };

        window.submitAd = function(e) {
            e.preventDefault();
            showToast("✅ Ad posted! (Demo)");
            closeSellModal();
        };

        window.doLogin = async function() {
            showToast("Login successful (Demo)");
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        };

        window.continueAsGuest = function() {
            showToast("👤 Guest mode");
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        };

        window.toggleForm = function() {
            const btn = document.getElementById('actionBtn');
            btn.textContent = btn.textContent === 'Login' ? 'Sign Up' : 'Login';
        };

        window.switchTab = function(tab) {
            showToast("Switched to " + tab);
        };

        window.applyFilters = function() {};

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            }
        });

        console.log('✅ EasySell Loaded - Click Post Ad Now');
    </script>
</body>
</html>
