        // ================================================================
        //  ORDERS / ESCROW
        // ================================================================
        async function handleBuyNow(productId) {
            if (!state.currentUser) {
                showToast('Sign in to buy', 'error');
                dom.authModal.classList.add('open');
                return;
            }
            const product = state.products.find(p => p.id === productId);
            if (!product) return;
            // Check seller bank account
            try {
                const sellerSnap = await db.collection('users').doc(product.sellerId).get();
                const seller = sellerSnap.data();
                if (!seller || !seller.bankAccount || !seller.bankAccount.accountNumber) {
                    showToast('Seller has not added bank details.', 'error');
                    return;
                }
            } catch (err) { showToast('Error checking seller details', 'error'); return; }
            if (!confirm(`Buy this item for ₦${(product.price || 0).toFixed(2)}? Payment will be held until you confirm delivery.`))
                return;
            try {
                showLoader(true);
                const token = await auth.currentUser.getIdToken();
                const response = await fetch(`${BACKEND_BASE}/initializePayment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ productId })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Payment initialization failed');
                const { paymentLink, transactionId } = result;
                const win = window.open(paymentLink, '_blank');
                if (!win) window.location.href = paymentLink;
                showToast('Payment initiated. Complete in the new window.', 'info');
                dom.detailModal.classList.remove('open');
                // Poll for status
                const checkInterval = setInterval(async () => {
                    try {
                        const txSnap = await db.collection('transactions').doc(transactionId).get();
                        if (txSnap.exists) {
                            const tx = txSnap.data();
                            if (tx.status === 'paid_held') {
                                clearInterval(checkInterval);
                                showToast('✅ Payment confirmed! Money held. Seller will ship soon.', 'success');
                                navigateTo('orders');
                                await loadTransactions();
                            } else if (tx.status === 'completed' || tx.status === 'refunded') {
                                clearInterval(checkInterval);
                            }
                        }
                    } catch (e) { /* ignore */ }
                }, 5000);
                setTimeout(() => clearInterval(checkInterval), 300000);
            } catch (err) {
                showToast('Payment failed: ' + err.message, 'error');
            } finally {
                showLoader(false);
            }
        }

        async function handleConfirmDelivery(transactionId) {
            if (!confirm('Confirm you received the item? Payment will be released to the seller.')) return;
            try {
                showLoader(true);
                const token = await auth.currentUser.getIdToken();
                const response = await fetch(`${BACKEND_BASE}/releaseFunds`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ transactionId })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Failed to release funds');
                showToast(result.message || '✅ Payment released!', 'success');
                await loadTransactions();
            } catch (err) { showToast('Error: ' + err.message, 'error'); } finally { showLoader(false); }
        }

        async function handleDispute(transactionId) {
            const reason = prompt('Why did you not receive the item?');
            if (!reason) return;
            try {
                showLoader(true);
                await db.collection('transactions').doc(transactionId).update({
                    status: 'disputed',
                    disputeReason: reason,
                    disputedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('Dispute filed. Admin will investigate.', 'info');
                await loadTransactions();
            } catch (err) { showToast('Error: ' + err.message, 'error'); } finally { showLoader(false); }
        }

        async function loadTransactions() {
            if (!state.currentUser) return;
            try {
                const snapshot = await db.collection('transactions')
                    .where('buyerId', '==', state.currentUser.uid)
                    .orderBy('createdAt', 'desc')
                    .get();
                const orders = [];
                snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                const container = dom.ordersList;
                const empty = dom.ordersEmpty;
                if (orders.length === 0) { container.innerHTML = '';
                    empty.style.display = 'block'; return; }
                empty.style.display = 'none';
                let html = '';
                for (const tx of orders) {
                    let productTitle = 'Deleted item';
                    try {
                        const prodSnap = await db.collection('products').doc(tx.productId).get();
                        if (prodSnap.exists) productTitle = prodSnap.data().title || 'Item';
                    } catch (e) { /* ignore */ }
                    const statusMap = {
                        'pending': '⏳ Awaiting payment',
                        'paid_held': '💰 Paid (held) – Awaiting delivery',
                        'completed': '✅ Completed – funds released',
                        'disputed': '⚠️ Disputed – under review',
                        'refunded': '↩️ Refunded'
                    };
                    const statusText = statusMap[tx.status] || tx.status;
                    const createdAt = tx.createdAt?.toDate ? new Date(tx.createdAt.toDate()).toLocaleDateString() :
                        'N/A';
                    html += `
                        <div class="order-card">
                            <div style="display:flex;justify-content:space-between;align-items:start;">
                                <div>
                                    <strong>${productTitle}</strong>
                                    <div class="text-muted text-sm">₦${(tx.amount || 0).toFixed(2)} (incl. ₦${(tx.platformFee || 0).toFixed(2)} fee)</div>
                                    <div class="status">Status: ${statusText}</div>
                                </div>
                                <div style="text-align:right;font-size:0.8rem;">${createdAt}</div>
                            </div>
                            ${tx.status === 'paid_held' ? `
                                <div class="order-actions">
                                    <button class="btn btn-primary btn-sm" onclick="handleConfirmDelivery('${tx.id}')"><i class="fas fa-check-circle"></i> I received it</button>
                                    <button class="btn btn-danger btn-sm" onclick="handleDispute('${tx.id}')"><i class="fas fa-flag"></i> I didn't receive</button>
                                </div>
                            ` : ''}
                            ${tx.status === 'disputed' ? `<div class="text-sm" style="color:#e74c3c;margin-top:4px;">Reason: ${tx.disputeReason || 'N/A'}</div>` : ''}
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (err) { showToast('Error loading orders: ' + err.message, 'error'); }
        }

        // ================================================================
        //  DASHBOARD
        // ================================================================
        async function loadDashboard() {
            if (!state.currentUser) {
                showToast('Sign in to view dashboard', 'error');
                dom.authModal.classList.add('open');
                return;
            }
            try {
                showLoader(true);
                const token = await auth.currentUser.getIdToken();
                const balRes = await fetch(`${BACKEND_BASE}/balances`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const balData = await balRes.json();
                if (!balRes.ok) throw new Error(balData.error || 'Failed to fetch balances');
                const balances = Array.isArray(balData.balances) ? balData.balances : [];
                dom.balanceCards.innerHTML = balances.map(b => `
                    <div class="balance-card">
                        <div class="currency">${b.currency} balance</div>
                        <div class="amount">${b.currency === 'NGN' ? '₦' : '$'}${parseFloat(b.balance || 0).toFixed(2)}</div>
                        <div style="font-size:0.6rem;color:var(--text-muted);">Ledger: ${b.currency === 'NGN' ? '₦' : '$'}${parseFloat(b.ledgerBalance || 0).toFixed(2)}</div>
                    </div>
                `).join('') || '<div class="empty-state"><h3>No balances yet</h3></div>';

                const txRes = await fetch(`${BACKEND_BASE}/transactions?limit=10`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const txData = await txRes.json();
                if (!txRes.ok) throw new Error(txData.error || 'Failed to fetch transactions');
                const transactions = Array.isArray(txData.transactions) ? txData.transactions : [];
                dom.recentTransactions.innerHTML = transactions.length === 0 ?
                    '<div class="empty-state" style="padding:20px;"><h3>No recent transactions</h3></div>' :
                    transactions.map(tx => {
                        const isSale = tx.buyerId !== state.currentUser.uid;
                        const amount = isSale ? tx.sellerEarning : tx.amount;
                        const statusIcon = tx.status === 'completed' ? '✅' : tx.status === 'paid_held' ?
                            '⏳' : '❌';
                        const statusText = tx.status === 'completed' ? 'Completed' : tx.status ===
                            'paid_held' ? 'Pending' : tx.status;
                        return `
                            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);font-size:0.85rem;">
                                <div>
                                    <div style="font-weight:600;">${tx.productTitle || 'Transaction'}</div>
                                    <div style="font-size:0.7rem;color:var(--text-muted);">${isSale ? 'Sale' : 'Purchase'} • ${statusText} ${statusIcon}</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-weight:600;${isSale ? 'color:var(--accent);' : 'color:#e74c3c;'}">${isSale ? '+' : '-'} ₦${(amount || 0).toFixed(2)}</div>
                                    <div style="font-size:0.6rem;color:var(--text-muted);">${new Date(tx.createdAt).toLocaleDateString()}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
            } catch (err) { console.error(err);
                showToast('Error loading dashboard: ' + err.message, 'error'); } finally { showLoader(false); }
        }

        dom.search.addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            loadProducts(true);
        });

        dom.filterPrice.addEventListener('change', (e) => {
            state.sortPrice = e.target.value;
            loadProducts(true);
        });
        dom.filterCondition.addEventListener('change', (e) => {
            state.filterCondition = e.target.value;
            loadProducts(true);
        });
        dom.filterLocation.addEventListener('change', (e) => {
            state.filterLocation = e.target.value;
            loadProducts(true);
        });

        // Category chips
        dom.categoryScroll.addEventListener('click', (e) => {
            const chip = e.target.closest('.category-chip');
            if (!chip) return;
            dom.categoryScroll.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.currentCategory = chip.dataset.category;
            loadProducts(true);
        });

        // ================================================================
        //  INFINITE SCROLL
        // ================================================================
        let scrollTimeout = false;
        window.addEventListener('scroll', () => {
            if (scrollTimeout) return;
            scrollTimeout = true;
            requestAnimationFrame(() => {
                const trigger = dom.scrollTrigger;
                const rect = trigger.getBoundingClientRect();
                if (rect.top < window.innerHeight + 100 && !state.loading && !state.allLoaded) {
                    loadProducts(false);
                }
                scrollTimeout = false;
            });
        });

        // ================================================================
        //  THEME TOGGLE (mock)
        // ================================================================
        dom.themeToggle.addEventListener('click', () => {
            // Toggle between dark and light (just a simple demo)
            const root = document.documentElement;
            const current = root.style.getPropertyValue('--bg-primary') || '#0d0d0d';
            if (current === '#0d0d0d') {
                root.style.setProperty('--bg-primary', '#f5f5f5');
                root.style.setProperty('--bg-secondary', '#ffffff');
                root.style.setProperty('--bg-card', '#e8e8e8');
                root.style.setProperty('--bg-input', '#d0d0d0');
                root.style.setProperty('--text-primary', '#111');
                root.style.setProperty('--text-secondary', '#333');
                root.style.setProperty('--text-muted', '#777');
                root.style.setProperty('--border-color', '#ccc');
                dom.themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                root.style.setProperty('--bg-primary', '#0d0d0d');
                root.style.setProperty('--bg-secondary', '#1a1a1a');
                root.style.setProperty('--bg-card', '#242424');
                root.style.setProperty('--bg-input', '#2a2a2a');
                root.style.setProperty('--text-primary', '#f0f0f0');
                root.style.setProperty('--text-secondary', '#aaa');
                root.style.setProperty('--text-muted', '#666');
                root.style.setProperty('--border-color', '#333');
                dom.themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
        });

        // ================================================================
        //  INIT
        // ================================================================
        function init() {
            showLoader(true);
            // Load initial products
            loadProducts(true);
            // Render profile if user already signed in
            if (auth.currentUser) {
                renderProfile();
                loadUserWishlist();
            }
            showLoader(false);
        }

        // ================================================================
        //  EXPOSE GLOBALS
        // ================================================================
        window.handleBuyNow = handleBuyNow;
        window.handleConfirmDelivery = handleConfirmDelivery;
        window.handleDispute = handleDispute;
        window.loadTransactions = loadTransactions;
        window.loadDashboard = loadDashboard;
        window.navigateTo = navigateTo;
        window.logoutUser = logoutUser;
        window.openZoom = openZoom;
        window.closeZoom = closeZoom;
        window.showDetail = showDetail;
        window.toggleWishlist = toggleWishlist;
        window.deleteProduct = deleteProduct;
        window.viewSeller = viewSeller;
        window.showBankSetup = showBankSetup;
        window.openWhatsApp = openWhatsApp;
        window.changeSlide = changeSlide;

        // ================================================================
        //  START
        // ================================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
