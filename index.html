<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasySell - Nigeria's Trusted Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #059669; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background:#f8f9fa; }

        header { background:white; padding:14px 16px; box-shadow:0 2px 12px rgba(0,0,0,0.08); position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; }
        .logo { font-size:26px; font-weight:800; color:var(--primary); }
        .logo span { color:#111827; }

        .search-bar { background:#f1f5f9; border-radius:50px; padding:12px 20px; margin:12px 16px; display:flex; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        .search-bar input { flex:1; border:none; background:transparent; outline:none; font-size:16px; padding-left:8px; }

        .sell-promo { margin:8px 16px 20px; background:linear-gradient(135deg,#059669,#047857); color:white; border-radius:16px; padding:28px 20px; text-align:center; box-shadow:0 10px 25px rgba(5,150,105,0.25); }

        .categories { display:flex; overflow-x:auto; padding:10px 16px; gap:12px; background:white; margin-bottom:16px; }
        .cat-item { text-align:center; min-width:70px; cursor:pointer; }
        .cat-icon { width:50px; height:50px; background:var(--primary); color:white; border-radius:12px; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; font-size:22px; }

        .products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(165px,1fr)); gap:16px; padding:0 16px 80px; }
        .product-card { background:white; border-radius:12px; overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.08); cursor:pointer; }
        .product-card img { width:100%; height:165px; object-fit:cover; }
        .product-info { padding:12px; }
        .product-name { font-weight:600; font-size:14.5px; line-height:1.35; margin-bottom:6px; }
        .product-price { color:var(--primary); font-size:17px; font-weight:700; }
        .product-location { font-size:12.5px; color:#64748b; margin-top:4px; }

        .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:8px 0; z-index:100; }
        .nav-item { text-align:center; color:#64748b; font-size:12px; cursor:pointer; }
        .nav-item.active { color:var(--primary); }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:flex-end; z-index:1000; }
        .modal.show { display:flex; }
        .modal-content { background:white; width:100%; max-height:94vh; border-radius:20px 20px 0 0; padding:20px; overflow-y:auto; }

        .detail-image-container {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            border-radius: 12px;
            background: #f1f5f9;
            cursor: zoom-in;
        }
        #detailImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        #detailImage.zoomed {
            cursor: zoom-out;
        }

        .submit-btn, .whatsapp-btn { 
            width:100%; padding:16px; border-radius:50px; font-size:17px; font-weight:700; margin-top:12px; 
        }
        .whatsapp-btn { background:#25D366; color:white; border:none; }

        .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#1f2937; color:white; padding:14px 28px; border-radius:9999px; display:none; z-index:2000; }
    </style>
</head>
<body>

    <!-- Header, Search, Categories, Sell Promo, Products, Bottom Nav (same as before) -->
    <!-- ... [Same as previous version] ... -->

    <!-- Detail Modal with Zoom -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <button onclick="closeDetailModal()" style="float:right;font-size:28px;background:none;border:none;">×</button>
            
            <div class="detail-image-container" id="imageContainer">
                <img id="detailImage" src="" alt="" onclick="toggleZoom(this)">
            </div>

            <h2 id="detailTitle" style="margin:12px 0;"></h2>
            <p id="detailPrice" style="font-size:24px;font-weight:700;color:var(--primary);"></p>
            <p id="detailLocation" style="color:#64748b;"></p>
            <p id="detailDesc" style="margin:16px 0;line-height:1.6;"></p>
            
            <button onclick="contactSeller()" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> Chat on WhatsApp
            </button>
            <button onclick="closeDetailModal()" style="margin-top:10px;width:100%;padding:14px;background:#f1f5f9;border:none;border-radius:50px;color:#64748b;">Close</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Firebase setup (same as before)
        const firebaseConfig = {
            apiKey: "AIzaSyAAWF9XukiN4nuA7LlbsaU2qiZgzTGM3FE",
            authDomain: "easysell-75318.firebaseapp.com",
            projectId: "easysell-75318",
            storageBucket: "easysell-75318.firebasestorage.app",
            messagingSenderId: "81916821182",
            appId: "1:81916821182:web:46064186708cec62eba8ef"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let allProducts = [];
        let selectedImageFiles = [];
        let currentDetail = null;
        let isZoomed = false;

        // Categories and other functions (same as previous)

        window.viewDetail = function(id) {
            currentDetail = allProducts.find(p => p.id === id);
            if (!currentDetail) return;

            const img = document.getElementById('detailImage');
            img.src = currentDetail.images?.[0] || 'https://via.placeholder.com/300x200/059669/fff?text=EasySell';
            img.classList.remove('zoomed');
            isZoomed = false;

            document.getElementById('detailTitle').textContent = currentDetail.title;
            document.getElementById('detailPrice').textContent = `₦${Number(currentDetail.price).toLocaleString()}`;
            document.getElementById('detailLocation').textContent = currentDetail.location || 'Nigeria';
            document.getElementById('detailDesc').textContent = currentDetail.description || 'No description provided';
            document.getElementById('detailModal').classList.add('show');
        };

        // Zoom Function
        window.toggleZoom = function(img) {
            isZoomed = !isZoomed;
            if (isZoomed) {
                img.style.transform = "scale(1.8)";
                img.style.cursor = "zoom-out";
            } else {
                img.style.transform = "scale(1)";
                img.style.cursor = "zoom-in";
            }
        };

        window.contactSeller = function() {
            if (!currentDetail || !currentDetail.phone) {
                showToast("Seller phone number not available");
                return;
            }
            const phone = currentDetail.phone.replace(/\D/g, '');
            const message = encodeURIComponent(`Hi, I'm interested in "\( {currentDetail.title}" for ₦ \){Number(currentDetail.price).toLocaleString()}. Is it still available?`);
            window.open(`https://wa.me/\( {phone}?text= \){message}`, '_blank');
        };

        // Rest of the script (loadProducts, submitAd, etc.) remains the same as previous version
        // ... [Include all previous script functions] ...

        function showToast(msg, error = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = error ? '#dc2626' : '#1f2937';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        renderCategories();
        auth.onAuthStateChanged(user => {
            currentUser = user;
            loadProducts();
        });
    </script>
</body>
</html>
